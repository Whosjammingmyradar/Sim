<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ═══════════════════════════════════════════════════════════
    // SIMULATION ENGINE
    // ═══════════════════════════════════════════════════════════
    const SIM_TYPES = {
      BALLISTIC_MISSILE: 'ballistic_missile',
      CRUISE_MISSILE: 'cruise_missile',
      SAM_INTERCEPT: 'sam_intercept',
      AIR_RADAR: 'air_radar',
      DOGFIGHT: 'dogfight',
      NAVAL_SALVO: 'naval_salvo',
      GROUND_ADVANCE: 'ground_advance',
      STEALTH_STRIKE: 'stealth_strike',
      ANTI_SHIP: 'anti_ship',
      HELICOPTER_ATTACK: 'helicopter_attack',
    };

    function getSimType(equipmentId) {
      const map = {
        iskander: SIM_TYPES.BALLISTIC_MISSILE, ss26: SIM_TYPES.BALLISTIC_MISSILE,
        ss21: SIM_TYPES.BALLISTIC_MISSILE, tochka: SIM_TYPES.BALLISTIC_MISSILE,
        atacms: SIM_TYPES.BALLISTIC_MISSILE, df26: SIM_TYPES.BALLISTIC_MISSILE,
        himars: SIM_TYPES.BALLISTIC_MISSILE, pzh2000: SIM_TYPES.BALLISTIC_MISSILE,
        kalibr: SIM_TYPES.CRUISE_MISSILE, tomahawk: SIM_TYPES.CRUISE_MISSILE,
        scalp: SIM_TYPES.CRUISE_MISSILE, jassm: SIM_TYPES.CRUISE_MISSILE,
        cx10a: SIM_TYPES.CRUISE_MISSILE, mq9: SIM_TYPES.CRUISE_MISSILE,
        tu160: SIM_TYPES.CRUISE_MISSILE, h6k: SIM_TYPES.CRUISE_MISSILE,
        df21d: SIM_TYPES.ANTI_SHIP, virginia: SIM_TYPES.ANTI_SHIP, astute: SIM_TYPES.ANTI_SHIP,
        s400: SIM_TYPES.SAM_INTERCEPT, s350: SIM_TYPES.SAM_INTERCEPT, buk: SIM_TYPES.SAM_INTERCEPT,
        tor: SIM_TYPES.SAM_INTERCEPT, tunguska: SIM_TYPES.SAM_INTERCEPT,
        patriot: SIM_TYPES.SAM_INTERCEPT, thaad: SIM_TYPES.SAM_INTERCEPT,
        nasams: SIM_TYPES.SAM_INTERCEPT, avenger: SIM_TYPES.SAM_INTERCEPT,
        hq9: SIM_TYPES.SAM_INTERCEPT, hq16: SIM_TYPES.SAM_INTERCEPT,
        hq17: SIM_TYPES.SAM_INTERCEPT, aster30: SIM_TYPES.SAM_INTERCEPT,
        iris_t: SIM_TYPES.SAM_INTERCEPT, hawk: SIM_TYPES.SAM_INTERCEPT,
        nebo: SIM_TYPES.AIR_RADAR, an_tpy2: SIM_TYPES.AIR_RADAR,
        jy26: SIM_TYPES.AIR_RADAR, ground403: SIM_TYPES.AIR_RADAR,
        f22: SIM_TYPES.DOGFIGHT, f16: SIM_TYPES.DOGFIGHT, su35: SIM_TYPES.DOGFIGHT,
        mig29: SIM_TYPES.DOGFIGHT, j16: SIM_TYPES.DOGFIGHT, j10c: SIM_TYPES.DOGFIGHT,
        eurofighter: SIM_TYPES.DOGFIGHT, rafale: SIM_TYPES.DOGFIGHT,
        gripen: SIM_TYPES.DOGFIGHT, meteor: SIM_TYPES.DOGFIGHT, pl15: SIM_TYPES.DOGFIGHT,
        f35a: SIM_TYPES.STEALTH_STRIKE, b2: SIM_TYPES.STEALTH_STRIKE,
        su57: SIM_TYPES.STEALTH_STRIKE, j20: SIM_TYPES.STEALTH_STRIKE,
        tornado: SIM_TYPES.STEALTH_STRIKE,
        gremyashchy: SIM_TYPES.NAVAL_SALVO, karakurt: SIM_TYPES.NAVAL_SALVO,
        soobrazitelny: SIM_TYPES.NAVAL_SALVO, burke: SIM_TYPES.NAVAL_SALVO,
        cvn: SIM_TYPES.NAVAL_SALVO, type055: SIM_TYPES.NAVAL_SALVO,
        type052d: SIM_TYPES.NAVAL_SALVO, type003: SIM_TYPES.NAVAL_SALVO,
        fremm: SIM_TYPES.NAVAL_SALVO, type45: SIM_TYPES.NAVAL_SALVO,
        t90: SIM_TYPES.GROUND_ADVANCE, t80: SIM_TYPES.GROUND_ADVANCE,
        bmp3: SIM_TYPES.GROUND_ADVANCE, m1a2: SIM_TYPES.GROUND_ADVANCE,
        bradley: SIM_TYPES.GROUND_ADVANCE, stryker: SIM_TYPES.GROUND_ADVANCE,
        ztz99: SIM_TYPES.GROUND_ADVANCE, zbd04: SIM_TYPES.GROUND_ADVANCE,
        leopard2a7: SIM_TYPES.GROUND_ADVANCE, challenger3: SIM_TYPES.GROUND_ADVANCE,
        cv90: SIM_TYPES.GROUND_ADVANCE,
        ah64: SIM_TYPES.HELICOPTER_ATTACK, ka52: SIM_TYPES.HELICOPTER_ATTACK,
        z10: SIM_TYPES.HELICOPTER_ATTACK,
      };
      return map[equipmentId] || SIM_TYPES.BALLISTIC_MISSILE;
    }

    class Particle {
      constructor(x, y, vx, vy, life, color, size = 2) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.color = color; this.size = size;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.05; this.vx *= 0.98; this.vy *= 0.98; this.life--;
      }
      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, Math.max(0.1, this.size * alpha), 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      get dead() { return this.life <= 0; }
    }

    function explode(particles, x, y, c1, c2, count = 60) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2, spd = Math.random() * 6 + 1;
        particles.push(new Particle(x, y, Math.cos(a)*spd, Math.sin(a)*spd,
          Math.random()*40+20, Math.random()>0.5?c1:c2, Math.random()*3+1));
      }
    }
    function smokeTrail(particles, x, y, color='#888888') {
      particles.push(new Particle(x+(Math.random()-.5)*4, y+(Math.random()-.5)*4,
        (Math.random()-.5)*.5, -Math.random()*.3, Math.random()*30+20, color, Math.random()*4+2));
    }
    function drawGrid(ctx, W, H, color='rgba(0,255,100,0.06)') {
      ctx.strokeStyle=color; ctx.lineWidth=0.5;
      for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    }
    function drawTerrain(ctx, W, H) {
      const sky=ctx.createLinearGradient(0,0,0,H*.55);
      sky.addColorStop(0,'#020810'); sky.addColorStop(1,'#04121e');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.55);
      const gnd=ctx.createLinearGradient(0,H*.55,0,H);
      gnd.addColorStop(0,'#0d1a08'); gnd.addColorStop(1,'#060d04');
      ctx.fillStyle=gnd; ctx.fillRect(0,H*.55,W,H*.45);
      ctx.strokeStyle='rgba(0,255,100,0.15)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,H*.55); ctx.lineTo(W,H*.55); ctx.stroke();
      ctx.fillStyle='#0a1506'; ctx.beginPath(); ctx.moveTo(0,H*.55);
      for(let x=0;x<=W;x+=20){const b=Math.sin(x*.03)*18+Math.sin(x*.07)*8; ctx.lineTo(x,H*.55-b);}
      ctx.lineTo(W,H*.55); ctx.closePath(); ctx.fill();
    }
    function drawSea(ctx, W, H, t) {
      const sea=ctx.createLinearGradient(0,H*.5,0,H);
      sea.addColorStop(0,'#001830'); sea.addColorStop(1,'#000810');
      ctx.fillStyle=sea; ctx.fillRect(0,H*.5,W,H*.5);
      ctx.strokeStyle='rgba(0,100,200,0.3)'; ctx.lineWidth=1;
      for(let wy=H*.52;wy<H;wy+=18){
        ctx.beginPath();
        for(let x=0;x<=W;x+=4){const wv=Math.sin((x+t*2)*.04)*3+Math.sin((x-t)*.07)*1.5; x===0?ctx.moveTo(x,wy+wv):ctx.lineTo(x,wy+wv);}
        ctx.stroke();
      }
    }
    function drawHUD(ctx, W, H, title, subtitle, color, t) {
      ctx.fillStyle='rgba(0,0,0,0.03)';
      for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,44);
      ctx.strokeStyle=color+'60'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,44); ctx.lineTo(W,44); ctx.stroke();
      ctx.fillStyle=color; ctx.font='bold 13px "Courier New"'; ctx.textAlign='left';
      ctx.fillText('⬛ '+title, 16, 18);
      ctx.fillStyle=color+'88'; ctx.font='10px "Courier New"';
      ctx.fillText(subtitle, 16, 34);
      ctx.textAlign='right'; ctx.fillStyle=color+'66';
      ctx.fillText('T+'+(t/60).toFixed(1)+'s  //  SIM ACTIVE', W-16, 18);
      const bs=16; ctx.strokeStyle=color+'44'; ctx.lineWidth=1.5;
      [[8,52],[W-8,52],[8,H-8],[W-8,H-8]].forEach(([cx,cy],i)=>{
        const sx=i%2===0?1:-1, sy=i<2?1:-1;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*bs,cy);
        ctx.moveTo(cx,cy); ctx.lineTo(cx,cy+sy*bs); ctx.stroke();
      });
    }
    function drawTank(ctx, x, y, color) {
      ctx.save(); ctx.translate(x,y);
      ctx.fillStyle=color+'cc'; ctx.fillRect(-16,-6,32,12);
      ctx.beginPath(); ctx.arc(0,-2,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=color; ctx.fillRect(8,-3,14,3);
      ctx.fillStyle=color+'88'; ctx.fillRect(-16,6,32,4);
      ctx.restore();
    }
    function drawAircraft(ctx, x, y, angle, color, label) {
      ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
      ctx.shadowBlur=6; ctx.shadowColor=color; ctx.fillStyle=color;
      ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-12,-3); ctx.lineTo(-16,0); ctx.lineTo(-12,3); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(4,0); ctx.lineTo(-6,-18); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(4,0); ctx.lineTo(-6,18); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-16,-8); ctx.lineTo(-14,0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-16,8); ctx.lineTo(-14,0); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
      ctx.fillStyle=color+'88'; ctx.font='8px "Courier New"'; ctx.textAlign='center';
      ctx.fillText(label, x, y-22);
    }
    function drawShip(ctx, x, y, color, label) {
      ctx.fillStyle=color+'cc';
      ctx.beginPath(); ctx.moveTo(x-50,y+8); ctx.lineTo(x+50,y+8); ctx.lineTo(x+60,y+18); ctx.lineTo(x-60,y+18); ctx.closePath(); ctx.fill();
      ctx.fillRect(x-20,y-10,40,18); ctx.fillRect(x-8,y-22,16,12);
      ctx.strokeStyle=color; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x,y-22); ctx.lineTo(x,y-38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-12,y-32); ctx.lineTo(x+12,y-32); ctx.stroke();
      ctx.fillStyle=color+'88'; ctx.font='8px "Courier New"'; ctx.textAlign='center';
      ctx.fillText(label, x, y-44);
    }

    // ── Sim renderers ──────────────────────────────────────────
    function simBallisticMissile(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state, dur=300, prog=t/dur;
      const lx=80,ly=H*.72,ix=W-80,iy=H*.72,ay=H*.08;
      const mx=lx+(ix-lx)*prog;
      const my=ly+(ay-ly)*Math.sin(prog*Math.PI)*-1+(iy-ly)*prog-Math.sin(prog*Math.PI)*(ly-ay);
      if(t%2===0&&prog<.95){smokeTrail(particles,mx,my,'#ff6600aa'); particles.push(new Particle(mx,my,(Math.random()-.5)*2,Math.random()*2,20,'#ffffff44',1.5));}
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      if(prog>.97&&!state.exploded){state.exploded=true; explode(particles,ix,iy,'#ff4400','#ffaa00',80); explode(particles,ix,iy,'#ffffff','#ff8800',40);}
      if(prog<.97){
        const pp=Math.max(0,prog-.01);
        const pmx=lx+(ix-lx)*pp, pmy=ly+(ay-ly)*Math.sin(pp*Math.PI)*-1+(iy-ly)*pp-Math.sin(pp*Math.PI)*(ly-ay);
        const angle=Math.atan2(my-pmy,mx-pmx);
        ctx.save(); ctx.translate(mx,my); ctx.rotate(angle);
        const eg=ctx.createRadialGradient(-12,0,0,-12,0,14);
        eg.addColorStop(0,'#ff8800cc'); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(-12,0,14,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-10,-4); ctx.lineTo(-10,4); ctx.closePath(); ctx.fill();
        ctx.fillStyle=color+'aa';
        ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-14,-8); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-14,8); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle=color+'20'; ctx.lineWidth=1; ctx.setLineDash([4,6]); ctx.beginPath();
      for(let p=0;p<=1;p+=.01){const px=lx+(ix-lx)*p, py=ly+(ay-ly)*Math.sin(p*Math.PI)*-1+(iy-ly)*p-Math.sin(p*Math.PI)*(ly-ay); p===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
      ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=color+'88'; ctx.fillRect(lx-6,ly,12,10);
      ctx.fillStyle=color+'44'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('RANGE: '+Math.round(prog*480)+'km / 480km', W/2, H-16);
      ctx.fillStyle=color+'88'; ctx.textAlign='right';
      ctx.fillText('ALT: '+Math.round(Math.max(0,Math.sin(prog*Math.PI))*120)+'km', W-20, H-16);
      return t>=dur+60;
    }

    function simCruiseMissile(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state;
      if(!state.path){state.path=[]; const ty=H*.52; for(let i=0;i<=200;i++){const x=60+(W-120)*(i/200); state.path.push({x,y:ty-40-Math.sin(i*.15)*18-Math.sin(i*.37)*10});}}
      const dur=280, prog=Math.min(t/dur,1), idx=Math.floor(prog*(state.path.length-1));
      const pos=state.path[Math.min(idx,state.path.length-1)];
      if(t%2===0&&prog<.97){smokeTrail(particles,pos.x,pos.y,'#aaaaaa66'); particles.push(new Particle(pos.x,pos.y,-1.5,(Math.random()-.5),15,'#ff8800aa',2));}
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      if(prog>.97&&!state.exploded){state.exploded=true; explode(particles,pos.x,pos.y,'#ff4400','#ffcc00',100);}
      ctx.strokeStyle=color+'18'; ctx.lineWidth=1; ctx.setLineDash([3,5]); ctx.beginPath();
      state.path.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke(); ctx.setLineDash([]);
      if(prog<.97){
        const next=state.path[Math.min(idx+1,state.path.length-1)];
        const angle=Math.atan2(next.y-pos.y,next.x-pos.x);
        ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(angle);
        const eg=ctx.createRadialGradient(-10,0,0,-10,0,10);
        eg.addColorStop(0,'#ff8800bb'); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(-10,0,10,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-8,-3); ctx.lineTo(-8,3); ctx.closePath(); ctx.fill();
        ctx.fillStyle=color+'cc';
        ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-3,-10); ctx.lineTo(-6,0); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-3,10); ctx.lineTo(-6,0); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle='#1a1a1a'; ctx.fillRect(W-90,H*.52-28,22,28); ctx.fillRect(W-110,H*.52-18,16,18);
      ctx.strokeStyle=color+'44'; ctx.lineWidth=1; ctx.strokeRect(W-90,H*.52-28,22,28);
      ctx.fillStyle=color+'66'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('NOE FLIGHT  //  ALT: '+Math.round(50+Math.sin(t*.1)*15)+'m  //  '+Math.round(prog*100)+'% TO TARGET', W/2, H-16);
      return t>=dur+60;
    }

    function simSAMIntercept(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state, dur=260, p=t/dur;
      const tx=W*.85-(W*.65)*p, ty=H*.05+(H*.65)*p*p;
      const samLaunch=60, intP=.55;
      const samP=Math.max(0,Math.min(1,(t-samLaunch)/((intP*dur)-samLaunch)));
      const sox=W*.25, soy=H*.7;
      const ix=W*.85-(W*.65)*intP, iy=H*.05+(H*.65)*intP*intP;
      const sx=sox+(ix-sox)*samP, sy=soy+(iy-soy)*samP-Math.sin(samP*Math.PI)*40;
      if(t%2===0&&p<.97) smokeTrail(particles,tx,ty,'#ff4444aa');
      if(t>samLaunch&&samP<.97){smokeTrail(particles,sx,sy,'#00ccffaa'); particles.push(new Particle(sx,sy,0,0,8,'#ffffff',1.5));}
      const intercepted=p>=intP-.01;
      if(intercepted&&!state.exploded){state.exploded=true; explode(particles,ix,iy,'#ffffff','#ffcc00',80); explode(particles,ix,iy,'#ff8800','#ff4400',40);}
      particles.forEach(p2=>p2.update()); particles.forEach(p2=>p2.draw(ctx)); state.particles=particles.filter(p2=>!p2.dead);
      const sweep=(t*2)%360;
      ctx.save(); ctx.translate(sox,soy);
      const sweepRad=sweep*Math.PI/180;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,120,sweepRad-.4,sweepRad); ctx.closePath();
      ctx.fillStyle=color+'12'; ctx.fill(); ctx.strokeStyle=color+'50'; ctx.lineWidth=1; ctx.stroke();
      [50,100,150,200].forEach(r=>{ctx.strokeStyle=color+'18'; ctx.lineWidth=.5; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();});
      ctx.restore();
      ctx.fillStyle=color; ctx.fillRect(sox-14,soy,28,12); ctx.fillStyle=color+'aa'; ctx.fillRect(sox-3,soy-16,6,16);
      if(!intercepted){
        ctx.fillStyle='#ff4444'; ctx.shadowBlur=8; ctx.shadowColor='#ff4444';
        ctx.beginPath(); ctx.arc(tx,ty,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      }
      if(t>samLaunch&&samP<.97){
        ctx.fillStyle=color; ctx.shadowBlur=10; ctx.shadowColor=color;
        ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      }
      ctx.fillStyle=state.exploded?'#00ff88':color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText(state.exploded?'✓ INTERCEPT CONFIRMED':(t<samLaunch?'TRACKING INBOUND THREAT':'INTERCEPTOR AWAY')+'  //  RANGE: '+Math.round((1-samP)*180)+'km', W/2, H-16);
      return t>=dur+80;
    }

    function simAirRadar(ctx, state, t, color, W, H) {
      ctx.fillStyle='#020808'; ctx.fillRect(0,0,W,H);
      drawGrid(ctx,W,H,'rgba(0,255,100,0.04)');
      const cx=W/2, cy=H/2, maxR=Math.min(W,H)*.42, sweep=(t*1.5)%360;
      [.25,.5,.75,1].forEach(f=>{
        const r=maxR*f; ctx.strokeStyle=color+'22'; ctx.lineWidth=.8;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle=color+'44'; ctx.font='9px "Courier New"'; ctx.textAlign='left';
        ctx.fillText(Math.round(f*400)+'km', cx+r+4, cy+4);
      });
      ctx.strokeStyle=color+'18'; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(cx,50); ctx.lineTo(cx,H-50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(50,cy); ctx.lineTo(W-50,cy); ctx.stroke();
      const sweepRad=sweep*Math.PI/180;
      for(let i=0;i<30;i++){const a=sweepRad-(i*.05); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,maxR,a-.05,a); ctx.closePath(); ctx.fillStyle=color+Math.floor((30-i)*4).toString(16).padStart(2,'0'); ctx.fill();}
      ctx.strokeStyle=color+'cc'; ctx.lineWidth=1.5; ctx.shadowBlur=8; ctx.shadowColor=color;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(sweepRad)*maxR,cy+Math.sin(sweepRad)*maxR); ctx.stroke(); ctx.shadowBlur=0;
      if(!state.contacts){state.contacts=[{angle:25,dist:.55,id:'TGT-001',type:'FIGHTER',threat:'HIGH'},{angle:110,dist:.38,id:'TGT-002',type:'BOMBER',threat:'CRITICAL'},{angle:200,dist:.71,id:'TGT-003',type:'UNDEF',threat:'UNKNOWN'},{angle:305,dist:.44,id:'TGT-004',type:'FIGHTER',threat:'HIGH'},{angle:68,dist:.82,id:'TGT-005',type:'MISSILE',threat:'CRITICAL'},{angle:155,dist:.28,id:'TGT-006',type:'HELICOPTER',threat:'MEDIUM'}]; state.cAge={}; state.contacts.forEach(c=>{state.cAge[c.id]=0;});}
      const TCOLS={'CRITICAL':'#ff3333','HIGH':'#ff8800','MEDIUM':'#ffdd00','UNKNOWN':'#aaaaaa'};
      state.contacts.forEach(c=>{
        const ca=c.angle*Math.PI/180, cx2=cx+Math.cos(ca)*maxR*c.dist, cy2=cy+Math.sin(ca)*maxR*c.dist;
        const diff=((sweep-c.angle)+360)%360; if(diff<8) state.cAge[c.id]=60;
        if(state.cAge[c.id]>0){
          state.cAge[c.id]--;
          const alpha=state.cAge[c.id]/60, tc=TCOLS[c.threat]||'#aaa';
          ctx.globalAlpha=alpha; ctx.fillStyle=tc; ctx.shadowBlur=10; ctx.shadowColor=tc;
          ctx.beginPath(); ctx.arc(cx2,cy2,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
          ctx.fillStyle=tc; ctx.font='bold 8px "Courier New"'; ctx.textAlign='left';
          ctx.fillText(c.id, cx2+8, cy2-4); ctx.fillStyle=tc+'aa'; ctx.fillText(c.type, cx2+8, cy2+6);
          ctx.globalAlpha=1;
        }
      });
      ctx.fillStyle=color; ctx.shadowBlur=12; ctx.shadowColor=color;
      ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      const active=Object.values(state.cAge||{}).filter(a=>a>0).length;
      ctx.fillStyle=active>0?'#ff3333':color+'66'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('CONTACTS: '+active+'  //  SWEEP: '+Math.round(sweep)+'°  //  MODE: LONG-RANGE SURVEILLANCE', W/2, H-16);
      return false;
    }

    function simDogfight(ctx, state, t, color, W, H) {
      const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,'#010510'); sky.addColorStop(.6,'#021020'); sky.addColorStop(1,'#030810');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H); drawGrid(ctx,W,H);
      if(!state.stars) state.stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*.7,r:Math.random()*1.2,b:Math.random()}));
      state.stars.forEach(s=>{ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(t*.05+s.b*10)*.2)+')'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();});
      const {particles}=state;
      const fx=(100+t*1.8)%W, fy=H*.35+Math.sin(t*.04)*80+Math.cos(t*.025)*40;
      const ex=(fx-200+Math.sin(t*.03)*60+W)%W, ey=fy+Math.cos(t*.04)*50+Math.sin(t*.06)*30;
      if(!state.missileFired&&t>120){state.missileFired=true; state.mx=fx; state.my=fy;}
      if(state.missileFired&&!state.missileHit){
        const mp=Math.min(1,(t-120)/80);
        state.mx=fx+(ex-fx)*mp; state.my=fy+(ey-fy)*mp;
        smokeTrail(particles,state.mx,state.my,'#aaaaaa88');
        if(mp>.9&&!state.missileHit){state.missileHit=true; explode(particles,state.mx,state.my,'#ff4400','#ffcc00',80);}
      }
      if(t%3===0){smokeTrail(particles,fx-20,fy,'#ffffff22'); if(!state.missileHit) smokeTrail(particles,ex-20,ey,'#ff440022');}
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      drawAircraft(ctx,fx,fy,Math.atan2(Math.cos(t*.04)*80*.04-Math.sin(t*.025)*40*.025,1.8),color,'FRIENDLY');
      if(!state.missileHit) drawAircraft(ctx,ex,ey,Math.atan2(ey-(H*.35+Math.sin((t-5)*.04)*80),1.5),'#ff3333','HOSTILE');
      if(state.missileFired&&!state.missileHit){ctx.fillStyle='#00ccff'; ctx.shadowBlur=8; ctx.shadowColor='#00ccff'; ctx.beginPath(); ctx.arc(state.mx%W,state.my,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;}
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('SPEED: M1.4  //  ALT: 8,200m  //  G: '+(2+Math.abs(Math.cos(t*.04))*7).toFixed(1)+'g  //  '+(state.missileHit?'✓ FOX-3 SPLASH':t>120?'FOX-3 AWAY':'RADAR LOCK'), W/2, H-16);
      return t>400;
    }

    function simNavalSalvo(ctx, state, t, color, W, H) {
      const sky=ctx.createLinearGradient(0,0,0,H*.5); sky.addColorStop(0,'#020810'); sky.addColorStop(1,'#041520');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.5); drawSea(ctx,W,H,t); drawGrid(ctx,W,H);
      const {particles}=state, sy=H*.58;
      drawShip(ctx,120,sy,color,'CVG-01');
      if(!state.targetSunk) drawShip(ctx,W-130,sy,'#ff3333','TGT-ALFA');
      if(!state.salvo) state.salvo=[];
      [60,80,100].forEach((lt,i)=>{
        if(t===lt){state.salvo.push({x:120,y:sy-10,launched:lt,id:i}); explode(particles,120,sy-10,'#ff8800','#ffffff',20);}
      });
      state.salvo.forEach(m=>{
        const mp=Math.min(1,(t-m.launched)/120);
        m.x=120+(W-250)*mp; m.y=(sy-10)-Math.sin(mp*Math.PI)*80;
        if(mp>.97&&!m.hit){m.hit=true; explode(particles,W-130,sy,'#ff4400','#ffcc00',80); if(m.id===2) state.targetSunk=true;}
        if(!m.hit&&mp<.97){smokeTrail(particles,m.x,m.y,'#aaaaaa66'); ctx.fillStyle=color; ctx.shadowBlur=6; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(m.x,m.y,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;}
      });
      if(state.targetSunk){const sk=t-280; if(sk>0&&sk%4===0) smokeTrail(particles,W-130+(Math.random()-.5)*30,sy-sk*.3,'#444444');}
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      const hits=state.salvo.filter(m=>m.hit).length;
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('SALVO: '+state.salvo.length+'/3 AWAY  //  IMPACTS: '+hits+'  //  '+(state.targetSunk?'✓ TARGET NEUTRALIZED':'TRACKING...'), W/2, H-16);
      return t>420;
    }

    function simGroundAdvance(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state, gy=H*.6;
      if(!state.units) state.units=Array.from({length:5},(_,i)=>({x:60+i*10,y:gy+Math.sin(i*1.2)*12,off:i*.8}));
      state.units.forEach((u,i)=>{
        u.x=Math.min(W-80,60+t*.9+i*25+Math.sin(t*.05+u.off)*5); u.y=gy+Math.sin(t*.04+u.off)*8;
        if(t%3===0) particles.push(new Particle(u.x-15,u.y+10,(Math.random()-.5)*2,-Math.random()*.5,25,'#8B7355aa',3));
        drawTank(ctx,u.x,u.y,color);
      });
      if(!state.enemies) state.enemies=[{x:W*.55,y:gy-5,alive:true},{x:W*.68,y:gy+5,alive:true},{x:W*.8,y:gy-8,alive:true}];
      state.enemies.forEach(e=>{
        const n=state.units[state.units.length-1];
        if(n.x>e.x-80&&e.alive){e.alive=false; explode(particles,e.x,e.y,'#ff4400','#ffcc00',60);}
        if(e.alive) drawTank(ctx,e.x,e.y,'#ff3333');
      });
      if(t%40===0&&state.units[state.units.length-1].x<W-120){const u=state.units[Math.floor(Math.random()*state.units.length)]; explode(particles,u.x+18,u.y,'#ffff00','#ff8800',15);}
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('ADVANCE: '+Math.min(100,Math.round(t/3.6))+'%  //  UNITS: '+state.units.length+'  //  NEUTRALIZED: '+state.enemies.filter(e=>!e.alive).length+'/'+state.enemies.length, W/2, H-16);
      return t>380;
    }

    function simStealthStrike(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state;
      if(!state.radars) state.radars=[{x:W*.45,y:H*.62,range:140,sweep:0,spd:1.2},{x:W*.7,y:H*.55,range:110,sweep:80,spd:-.9}];
      state.radars.forEach(r=>{
        r.sweep=(r.sweep+r.spd)%360;
        ctx.save(); ctx.translate(r.x,r.y);
        const a=r.sweep*Math.PI/180;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r.range,a-.4,a); ctx.closePath(); ctx.fillStyle='#ff333318'; ctx.fill();
        ctx.strokeStyle='#ff333340'; ctx.lineWidth=1; ctx.stroke();
        [r.range*.5,r.range].forEach(rr=>{ctx.strokeStyle='#ff333320'; ctx.lineWidth=.5; ctx.beginPath(); ctx.arc(0,0,rr,0,Math.PI*2); ctx.stroke();});
        ctx.restore(); ctx.fillStyle='#ff3333aa'; ctx.fillRect(r.x-4,r.y-10,8,10);
      });
      const dur=320, p=t/dur;
      const pts=[{x:30,y:H*.2},{x:W*.2,y:H*.35},{x:W*.35,y:H*.15},{x:W*.55,y:H*.3},{x:W*.75,y:H*.2},{x:W*.88,y:H*.45},{x:W-40,y:H*.58}];
      const segC=pts.length-1, seg=Math.min(segC-1,Math.floor(p*segC)), segP=(p*segC)-seg;
      const from=pts[seg], to=pts[Math.min(seg+1,pts.length-1)];
      const mx=from.x+(to.x-from.x)*segP, my=from.y+(to.y-from.y)*segP;
      const angle=Math.atan2(to.y-from.y,to.x-from.x);
      if(t%4===0&&p<.95) particles.push(new Particle(mx-Math.cos(angle)*15,my-Math.sin(angle)*15,-Math.cos(angle)*.5,(Math.random()-.5)*.3,12,color+'44',2));
      particles.forEach(pp=>pp.update()); particles.forEach(pp=>pp.draw(ctx)); state.particles=particles.filter(pp=>!pp.dead);
      if(p>.9&&!state.bombed){state.bombed=true; explode(particles,W-60,H*.62,'#ff4400','#ffcc00',100);}
      ctx.strokeStyle=color+'15'; ctx.lineWidth=1; ctx.setLineDash([3,8]); ctx.beginPath();
      pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke(); ctx.setLineDash([]);
      if(p<.97){ctx.save(); ctx.translate(mx,my); ctx.rotate(angle); ctx.shadowBlur=3; ctx.shadowColor=color; ctx.fillStyle=color+'dd'; ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-10,-20); ctx.lineTo(-14,0); ctx.lineTo(-10,20); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.restore();}
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('RCS: <0.001m²  //  STATUS: UNDETECTED  //  '+(state.bombed?'✓ TARGET DESTROYED':'PENETRATING AIR DEFENSE'), W/2, H-16);
      return t>dur+80;
    }

    function simAntiShip(ctx, state, t, color, W, H) {
      const sky2=ctx.createLinearGradient(0,0,0,H*.5); sky2.addColorStop(0,'#010810'); sky2.addColorStop(1,'#031520');
      ctx.fillStyle=sky2; ctx.fillRect(0,0,W,H*.5); drawSea(ctx,W,H*.6,t); drawGrid(ctx,W,H);
      const {particles}=state, seaY=H*.55;
      ctx.fillStyle=color+'aa'; ctx.fillRect(60,seaY+5,80,14); ctx.fillRect(85,seaY-8,20,14);
      ctx.fillStyle=color+'66'; ctx.font='8px "Courier New"'; ctx.textAlign='center'; ctx.fillText('LAUNCH PLATFORM',100,seaY+28);
      drawShip(ctx,W-160,seaY,'#ff3333','CVN-TARGET');
      drawShip(ctx,W-80,seaY+8,'#ff333388','ESCORT');
      const dur=280, p=t/dur;
      const mx=140+(W-300)*p, baseY=seaY-15, popUp=p>.75?Math.sin((p-.75)/.25*Math.PI)*80:0, my=baseY-popUp;
      if(t%2===0&&p<.95){smokeTrail(particles,mx,my,'#aaaaaa55'); particles.push(new Particle(mx,my,0,.3,10,'#ff8800aa',2));}
      if(p>.95&&!state.impact){state.impact=true; explode(particles,W-160,seaY,'#ff4400','#ffcc00',100);}
      particles.forEach(p2=>p2.update()); particles.forEach(p2=>p2.draw(ctx)); state.particles=particles.filter(p2=>!p2.dead);
      if(p<.95){ctx.fillStyle=color; ctx.shadowBlur=8; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(mx,my,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle=color+'66'; ctx.setLineDash([2,4]); ctx.strokeStyle=color+'33'; ctx.lineWidth=.5; ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx,seaY); ctx.stroke(); ctx.setLineDash([]);}
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('SEA-SKIMMING  //  ALT: '+Math.max(5,Math.round(15-p*10))+'m  //  '+(state.impact?'✓ DIRECT HIT ON CVN':'TERMINAL PHASE'), W/2, H-16);
      return t>dur+80;
    }

    function simHelicopterAttack(ctx, state, t, color, W, H) {
      drawTerrain(ctx,W,H); drawGrid(ctx,W,H);
      const {particles}=state, gy=H*.62, hx=W*.25, hy=H*.38+Math.sin(t*.05)*8;
      const ra=t*.2;
      ctx.save(); ctx.translate(hx,hy-16); ctx.strokeStyle=color+'cc'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(Math.cos(ra)*28,Math.sin(ra)*8); ctx.lineTo(Math.cos(ra+Math.PI)*28,Math.sin(ra+Math.PI)*8); ctx.stroke(); ctx.restore();
      ctx.fillStyle=color; ctx.beginPath(); ctx.ellipse(hx,hy,22,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(hx+18,hy-2,18,4); ctx.fillStyle=color+'88'; ctx.beginPath(); ctx.arc(hx-6,hy-6,7,0,Math.PI*2); ctx.fill();
      if(t%2===0) particles.push(new Particle(hx+(Math.random()-.5)*40,hy+12,(Math.random()-.5)*3,Math.random()*1,20,'#8B7355aa',3));
      if(!state.targets) state.targets=[{x:W*.6,y:gy-4,alive:true},{x:W*.72,y:gy+3,alive:true},{x:W*.83,y:gy-6,alive:true}];
      [80,140,200].forEach((ft,i)=>{
        if(t===ft&&state.targets[i]?.alive){state['m'+i]={x:hx,y:hy,hit:false}; explode(particles,hx+22,hy,'#ff8800','#ffff00',15);}
        const m=state['m'+i];
        if(m&&!m.hit){const mp=Math.min(1,(t-ft)/50); m.x=hx+(state.targets[i].x-hx)*mp; m.y=hy+(state.targets[i].y-hy)*mp; smokeTrail(particles,m.x,m.y,'#ff880088'); if(mp>.95&&state.targets[i].alive){m.hit=true; state.targets[i].alive=false; explode(particles,state.targets[i].x,state.targets[i].y,'#ff4400','#ffcc00',70);} if(!m.hit){ctx.fillStyle=color; ctx.beginPath(); ctx.arc(m.x,m.y,3,0,Math.PI*2); ctx.fill();}}
      });
      state.targets.forEach(tgt=>{if(tgt.alive) drawTank(ctx,tgt.x,tgt.y,'#ff3333');});
      particles.forEach(p=>p.update()); particles.forEach(p=>p.draw(ctx)); state.particles=particles.filter(p=>!p.dead);
      const kills=state.targets.filter(tg=>!tg.alive).length;
      ctx.fillStyle=color+'88'; ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('NOE HOVER  //  ATGM: '+[80,140,200].filter(ft=>t>ft).length+'  //  KILLS: '+kills+'/3  //  '+(kills===3?'✓ AREA CLEAR':'ENGAGING'), W/2, H-16);
      return t>320;
    }

    const SW = 860, SH = 520;

    const SIM_LABELS = {
      ballistic_missile: 'BALLISTIC MISSILE TRAJECTORY',
      cruise_missile: 'CRUISE MISSILE NOE FLIGHT',
      sam_intercept: 'SAM INTERCEPT ENGAGEMENT',
      air_radar: 'LONG-RANGE SURVEILLANCE RADAR',
      dogfight: 'BEYOND VISUAL RANGE ENGAGEMENT',
      naval_salvo: 'NAVAL STRIKE SALVO',
      ground_advance: 'ARMORED FORCE ADVANCE',

    };

    function WeaponSimulation({ equipment, country, onClose }) {
      const canvasRef = useRef(null);
      const stateRef = useRef({ particles: [], t: 0 });
      const rafRef = useRef(null);
      const simType = getSimType(equipment.id);
      const countryColor = { russia:'#cc2222', usa:'#1a4fa0', china:'#c8a000', nato:'#1a7a3c' }[country] || '#00cc55';

      const animate = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const state = stateRef.current;
        const t = state.t;
        ctx.clearRect(0, 0, SW, SH);
        let done = false;
        switch(simType) {
          case 'ballistic_missile': done = simBallisticMissile(ctx, state, t, countryColor, SW, SH); break;
          case 'cruise_missile':    done = simCruiseMissile(ctx, state, t, countryColor, SW, SH); break;
          case 'sam_intercept':     done = simSAMIntercept(ctx, state, t, countryColor, SW, SH); break;
          case 'air_radar':         done = simAirRadar(ctx, state, t, countryColor, SW, SH); break;
          case 'dogfight':          done = simDogfight(ctx, state, t, countryColor, SW, SH); break;
          case 'naval_salvo':       done = simNavalSalvo(ctx, state, t, countryColor, SW, SH); break;
          case 'ground_advance':    done = simGroundAdvance(ctx, state, t, countryColor, SW, SH); break;
          case 'stealth_strike':    done = simStealthStrike(ctx, state, t, countryColor, SW, SH); break;
          case 'anti_ship':         done = simAntiShip(ctx, state, t, countryColor, SW, SH); break;
          case 'helicopter_attack': done = simHelicopterAttack(ctx, state, t, countryColor, SW, SH); break;
          default:                  done = simBallisticMissile(ctx, state, t, countryColor, SW, SH);
        }
        drawHUD(ctx, SW, SH, equipment.name, SIM_LABELS[simType]||'SIMULATION', countryColor, t);
        if (done && simType !== 'air_radar') {
          Object.keys(stateRef.current).forEach(k => { if(k!=='t'&&k!=='particles') delete stateRef.current[k]; });
          stateRef.current.particles = [];
          stateRef.current.t = 0;
        } else {
          state.t++;
        }
        rafRef.current = requestAnimationFrame(animate);
      }, [simType, countryColor, equipment]);

      useEffect(() => {
        stateRef.current = { particles: [], t: 0 };
        rafRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(rafRef.current);
      }, [animate]);

      const reset = () => { stateRef.current = { particles: [], t: 0 }; };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:1000, background:'rgba(0,0,0,0.92)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'"Courier New",monospace' }}>
          <div style={{ position:'absolute', inset:0 }} onClick={onClose} />
          <div style={{ position:'relative', zIndex:1, border:`1px solid ${countryColor}40`, boxShadow:`0 0 40px ${countryColor}20, 0 0 80px rgba(0,0,0,0.8)`, background:'#020808' }}>
            <canvas ref={canvasRef} width={SW} height={SH} style={{ display:'block', maxWidth:'95vw' }} />
            <div style={{ background:'#020808', borderTop:`1px solid ${countryColor}30`, padding:'10px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:11, color:countryColor, fontWeight:'bold', letterSpacing:1 }}>{equipment.name}</div>
                <div style={{ fontSize:9, color:countryColor+'66', marginTop:2 }}>{equipment.type}  ·  THREAT: {equipment.threat}</div>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={reset} style={{ background:'transparent', border:`1px solid ${countryColor}40`, color:countryColor+'88', padding:'5px 14px', cursor:'pointer', fontSize:10, fontFamily:'"Courier New"' }}>↺ REPLAY</button>
                <button onClick={onClose} style={{ background:'#1a0a0a', border:'1px solid #ff444440', color:'#ff4444', padding:'5px 14px', cursor:'pointer', fontSize:10, fontFamily:'"Courier New"' }}>✕ CLOSE</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

      }},
      china: { name:'China (PLA)', color:'#c8a000', flag:'🇨🇳', equipment: {
        aircraft: [
          {id:'j20',name:"J-20 'Mighty Dragon'",type:'Stealth Fighter',symbol:'✈',threat:'CRITICAL'},
          {id:'j16',name:"J-16 'Flanker-L'",type:'Strike Fighter',symbol:'✈',threat:'HIGH'},
          {id:'j10c',name:'J-10C',type:'Multirole Fighter',symbol:'✈',threat:'HIGH'},
          {id:'h6k',name:"H-6K 'Badger'",type:'Strategic Bomber',symbol:'✈',threat:'CRITICAL'},
          {id:'z10',name:"Z-10 'Fierce Thunder'",type:'Attack Helicopter',symbol:'🚁',threat:'HIGH'},
        ],
        air_defense: [
          {id:'hq9',name:'HQ-9B',type:'Long-Range SAM',symbol:'⬡',threat:'CRITICAL'},

        missiles: [

        ],
        naval: [
          {id:'type055',name:'Type 055 Renhai',type:'Cruiser',symbol:'⛵',threat:'CRITICAL'},
          {id:'type052d',name:'Type 052D Destroyer',type:'Destroyer',symbol:'⛵',threat:'HIGH'},

        ground: [
          {id:'ztz99',name:'ZTZ-99A',type:'MBT',symbol:'▬',threat:'HIGH'},
          {id:'zbd04',name:'ZBD-04A',type:'IFV',symbol:'▬',threat:'MEDIUM'},
        ],
      }},
      nato: { name:'NATO Allies', color:'#1a7a3c', flag:'🏳️', equipment: {
        aircraft: [
          {id:'eurofighter',name:'Eurofighter Typhoon',type:'Air Superiority',symbol:'✈',threat:'HIGH'},
          {id:'rafale',name:'Dassault Rafale F4',type:'Multirole Fighter',symbol:'✈',threat:'HIGH'},
          {id:'gripen',name:'Saab JAS 39E Gripen',type:'Multirole Fighter',symbol:'✈',threat:'HIGH'},
          {id:'tornado',name:'Panavia Tornado IDS',type:'Strike Aircraft',symbol:'✈',threat:'MEDIUM'},
        ],
        air_defense: [
          {id:'aster30',name:'Aster 30 SAMP/T',type:'Medium-Range SAM',symbol:'⬡',threat:'HIGH'},
          {id:'iris_t',name:'IRIS-T SLM',type:'Short-Range SAM',symbol:'⬡',threat:'HIGH'},
          {id:'hawk',name:'MIM-23 HAWK',type:'Medium SAM',symbol:'⬡',threat:'MEDIUM'},
          {id:'ground403',name:'Ground Master 403 Radar',type:'EW/Radar',symbol:'📡',threat:'HIGH'},
        ],
        missiles: [
          {id:'scalp',name:'SCALP-EG / Storm Shadow',type:'Cruise Missile',symbol:'↑',threat:'CRITICAL'},
          {id:'meteor',name:'Meteor BVRAAM',type:'Air-to-Air Missile',symbol:'↑',threat:'CRITICAL'},
          {id:'pzh2000',name:'PzH 2000 SPH',type:'Self-Propelled Howitzer',symbol:'↑',threat:'HIGH'},
        ],
        naval: [
          {id:'fremm',name:'FREMM Frigate',type:'Frigate',symbol:'⛵',threat:'HIGH'},
          {id:'type45',name:'Type 45 Destroyer',type:'Destroyer',symbol:'⛵',threat:'HIGH'},
          {id:'astute',name:'Astute-class SSN',type:'Attack Sub',symbol:'⛵',threat:'CRITICAL'},
        ],
        ground: [
          {id:'leopard2a7',name:'Leopard 2A7+',type:'MBT',symbol:'▬',threat:'HIGH'},
          {id:'challenger3',name:'Challenger 3',type:'MBT',symbol:'▬',threat:'HIGH'},
          {id:'cv90',name:'CV90 Mk.IV',type:'IFV',symbol:'▬',threat:'MEDIUM'},
        ],
      }},
    };

    const THREAT_COLORS = { CRITICAL:'#ff3333', HIGH:'#ff8800', MEDIUM:'#ffdd00', LOW:'#33cc33' };
    const CATEGORIES = ['aircraft','air_defense','missiles','naval','ground'];
    const CAT_LABELS = { aircraft:'Aircraft', air_defense:'Air Defense', missiles:'Missiles & Artillery', naval:'Naval Assets', ground:'Ground Forces' };
    let unitIdCounter = 1;

    // ═══════════════════════════════════════════════════════════
    // MAIN MAP APP
    // ═══════════════════════════════════════════════════════════
    function App() {
      const canvasRef = useRef(null);
      const [units, setUnits] = useState([]);
      const [selCountry, setSelCountry] = useState('russia');
      const [selCat, setSelCat] = useState('aircraft');
      const [selEq, setSelEq] = useState(null);
      const [placing, setPlacing] = useState(false);
      const [selUnit, setSelUnit] = useState(null);
      const [dragging, setDragging] = useState(null);
      const [pan, setPan] = useState({x:0,y:0});
      const [zoom, setZoom] = useState(1);
      const [isPanning, setIsPanning] = useState(false);
      const [lastPan, setLastPan] = useState(null);
      const [briefing, setBriefing] = useState(false);
      const [scenario, setScenario] = useState('Baltic Sea Theater');
      const [simEq, setSimEq] = useState(null);
      const W=900, H=620;

      const drawMap = useCallback(() => {
        const canvas = canvasRef.current; if(!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,W,H); ctx.save(); ctx.translate(pan.x,pan.y); ctx.scale(zoom,zoom);
        const bg=ctx.createLinearGradient(0,0,W,H); bg.addColorStop(0,'#0d1a0d'); bg.addColorStop(.5,'#0a1a12'); bg.addColorStop(1,'#0d1520');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='rgba(0,255,100,0.08)'; ctx.lineWidth=.5;
        for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
        for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
        [{x:50,y:60,w:300,h:200,c:'rgba(20,50,20,0.6)'},{x:380,y:40,w:250,h:180,c:'rgba(15,45,15,0.5)'},{x:600,y:80,w:280,h:220,c:'rgba(18,48,18,0.55)'},{x:80,y:310,w:200,h:200,c:'rgba(20,50,20,0.5)'},{x:350,y:280,w:180,h:150,c:'rgba(22,52,22,0.5)'},{x:580,y:350,w:290,h:230,c:'rgba(15,45,15,0.55)'},{x:170,y:450,w:350,h:160,c:'rgba(20,50,20,0.5)'}].forEach(z=>{ctx.fillStyle=z.c;ctx.beginPath();ctx.ellipse(z.x+z.w/2,z.y+z.h/2,z.w/2,z.h/2,0,0,Math.PI*2);ctx.fill();});
        [{x:260,y:200,w:180,h:120,c:'rgba(0,30,80,0.7)'},{x:470,y:250,w:140,h:100,c:'rgba(0,25,70,0.65)'},{x:120,y:350,w:240,h:130,c:'rgba(0,30,80,0.6)'},{x:700,y:310,w:180,h:110,c:'rgba(0,28,75,0.65)'}].forEach(z=>{ctx.fillStyle=z.c;ctx.beginPath();ctx.ellipse(z.x+z.w/2,z.y+z.h/2,z.w/2,z.h/2,.3,0,Math.PI*2);ctx.fill();});
        ctx.fillStyle='rgba(0,255,100,0.25)'; ctx.font="10px 'Courier New'";
        for(let gx=0;gx<W;gx+=120) for(let gy=0;gy<H;gy+=80) ctx.fillText((60-gy/10).toFixed(1)+'N '+(20+gx/15).toFixed(1)+'E',gx+4,gy+12);
        if(selUnit){const u=units.find(u=>u.id===selUnit); if(u){ctx.strokeStyle=THREAT_COLORS[u.threat]+'44';ctx.lineWidth=1;ctx.setLineDash([4,4]);[60,120,200].forEach(r=>{ctx.beginPath();ctx.arc(u.x,u.y,r,0,Math.PI*2);ctx.stroke();});ctx.setLineDash([]);}}
        units.forEach(unit=>{
          const isSel=unit.id===selUnit, cc=COUNTRIES[unit.country].color, tc=THREAT_COLORS[unit.threat];
          ctx.shadowBlur=isSel?20:8; ctx.shadowColor=cc;
          ctx.fillStyle=isSel?cc:cc+'cc'; ctx.strokeStyle=isSel?'#ffffff':tc; ctx.lineWidth=isSel?2:1;
          ctx.beginPath(); ctx.arc(unit.x,unit.y,isSel?14:10,0,Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.shadowBlur=0;
          ctx.fillStyle='#ffffff'; ctx.font=(isSel?12:10)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(unit.symbol,unit.x,unit.y);
          if(zoom>.7){
            ctx.fillStyle=cc; ctx.font="bold 9px 'Courier New'"; ctx.textAlign='left'; ctx.textBaseline='top';
            const lw=ctx.measureText(unit.name).width+8;
            ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(unit.x+14,unit.y-9,lw,14);
            ctx.strokeStyle=cc+'88'; ctx.lineWidth=.5; ctx.strokeRect(unit.x+14,unit.y-9,lw,14);
            ctx.fillStyle=cc; ctx.fillText(unit.name,unit.x+18,unit.y-8);
          }
          ctx.fillStyle=tc; ctx.beginPath(); ctx.arc(unit.x+(isSel?11:8),unit.y-(isSel?11:8),3,0,Math.PI*2); ctx.fill();
        });
        if(placing){ctx.strokeStyle='rgba(255,255,0,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);}
        ctx.restore();
        if(briefing){ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,36);ctx.fillStyle='#00ff66';ctx.font="bold 13px 'Courier New'";ctx.textAlign='center';ctx.fillText('⬛ CLASSIFIED // INTEL BRIEFING // '+scenario.toUpperCase()+' // '+new Date().toUTCString().replace('GMT','Z'),W/2,22);}
      }, [units,selUnit,pan,zoom,placing,briefing,scenario]);

      useEffect(() => { drawMap(); }, [drawMap]);

      const coords = e => { const r=canvasRef.current.getBoundingClientRect(),sx=W/r.width,sy=H/r.height; return {x:((e.clientX-r.left)*sx-pan.x)/zoom,y:((e.clientY-r.top)*sy-pan.y)/zoom}; };

      const handleClick = e => {
        if(isPanning) return;
        const {x,y}=coords(e);
        if(placing&&selEq){const eq=COUNTRIES[selCountry].equipment[selCat].find(q=>q.id===selEq); if(eq) setUnits(p=>[...p,{id:unitIdCounter++,country:selCountry,category:selCat,...eq,x,y}]); return;}
        let clicked=null; units.forEach(u=>{if(Math.sqrt((u.x-x)**2+(u.y-y)**2)<16) clicked=u.id;}); setSelUnit(clicked);
      };
      const handleDown = e => {
        if(e.button===1||e.altKey){setIsPanning(true);setLastPan({x:e.clientX,y:e.clientY});e.preventDefault();}
        const {x,y}=coords(e); units.forEach(u=>{if(Math.sqrt((u.x-x)**2+(u.y-y)**2)<16&&!placing) setDragging(u.id);});
      };
      const handleMove = e => {
        if(isPanning&&lastPan){setPan(p=>({x:p.x+e.clientX-lastPan.x,y:p.y+e.clientY-lastPan.y}));setLastPan({x:e.clientX,y:e.clientY});}
        if(dragging!==null){const {x,y}=coords(e);setUnits(p=>p.map(u=>u.id===dragging?{...u,x,y}:u));}
      };
      const handleUp = () => { setIsPanning(false);setLastPan(null);setDragging(null); };
      const handleWheel = e => { e.preventDefault(); setZoom(z=>Math.min(3,Math.max(0.3,z*(e.deltaY>0?.9:1.1)))); };
      const removeUnit = id => { setUnits(p=>p.filter(u=>u.id!==id)); setSelUnit(null); };
      const selUnitObj = units.find(u=>u.id===selUnit);
      const countsByCountry = Object.keys(COUNTRIES).map(k=>({key:k,...COUNTRIES[k],count:units.filter(u=>u.country===k).length}));
      const cc = COUNTRIES[selCountry].color;

      return (
        <div style={{display:'flex',flexDirection:'column',height:'100vh',width:'100vw',background:'#060d08',color:'#00cc55',fontFamily:"'Courier New',monospace",overflow:'hidden',userSelect:'none'}}>
          {/* Top bar */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 16px',background:'#050a06',borderBottom:'1px solid #00cc5540',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{color:'#ff3333',fontSize:10,letterSpacing:2}}>⬛ CLASSIFIED</span>
              <span style={{color:'#00cc55',fontSize:13,fontWeight:'bold',letterSpacing:1}}>TACTICAL INTELLIGENCE PLATFORM</span>
              <span style={{color:'#00cc5566',fontSize:10}}>v2.6 // UNCLASS TRAINING USE</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={scenario} onChange={e=>setScenario(e.target.value)} style={{background:'#0a1a0a',border:'1px solid #00cc5540',color:'#00cc55',padding:'3px 8px',fontSize:11,fontFamily:"'Courier New'",width:220}} />
              <button onClick={()=>setBriefing(b=>!b)} style={{background:briefing?'#00cc55':'#0a1a0a',color:briefing?'#000':'#00cc55',border:'1px solid #00cc5540',padding:'3px 10px',cursor:'pointer',fontSize:11,fontFamily:"'Courier New'"}}>BRIEFING MODE</button>
              <button onClick={()=>{setUnits([]);setSelUnit(null);}} style={{background:'#1a0a0a',color:'#ff4444',border:'1px solid #ff444440',padding:'3px 10px',cursor:'pointer',fontSize:11,fontFamily:"'Courier New'"}}>CLEAR ALL</button>
            </div>
          </div>

          <div style={{display:'flex',flex:1,overflow:'hidden'}}>
            {/* Left panel */}
            <div style={{width:260,background:'#050d06',borderRight:'1px solid #00cc5520',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
              <div style={{padding:'8px 10px',borderBottom:'1px solid #00cc5520'}}>
                <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>SELECT NATION / FORCE</div>
                {Object.entries(COUNTRIES).map(([k,c])=>(
                  <button key={k} onClick={()=>setSelCountry(k)} style={{display:'flex',alignItems:'center',gap:8,background:selCountry===k?c.color+'22':'transparent',border:`1px solid ${selCountry===k?c.color:c.color+'33'}`,color:selCountry===k?c.color:c.color+'99',padding:'4px 8px',cursor:'pointer',textAlign:'left',fontFamily:"'Courier New'",fontSize:11,width:'100%',marginBottom:3}}>
                    <span>{c.flag}</span><span style={{flex:1,fontWeight:'bold'}}>{c.name}</span>
                    <span style={{background:c.color+'33',padding:'1px 5px',fontSize:9,color:c.color}}>{units.filter(u=>u.country===k).length}</span>
                  </button>
                ))}
              </div>
              <div style={{padding:'8px 10px',borderBottom:'1px solid #00cc5520'}}>
                <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>EQUIPMENT CATEGORY</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                  {CATEGORIES.map(cat=>(
                    <button key={cat} onClick={()=>{setSelCat(cat);setSelEq(null);}} style={{background:selCat===cat?'#00cc5522':'transparent',border:`1px solid ${selCat===cat?'#00cc55':'#00cc5530'}`,color:selCat===cat?'#00cc55':'#00cc5566',padding:'3px 7px',cursor:'pointer',fontSize:9,fontFamily:"'Courier New'"}}>{CAT_LABELS[cat]}</button>
                  ))}
                </div>
              </div>
              <div style={{flex:1,overflow:'auto',padding:'6px 10px'}}>
                <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>ASSETS — {CAT_LABELS[selCat].toUpperCase()}</div>
                {(COUNTRIES[selCountry].equipment[selCat]||[]).map(eq=>(
                  <div key={eq.id} style={{display:'flex',flexDirection:'column',gap:4,background:selEq===eq.id?cc+'22':'transparent',border:`1px solid ${selEq===eq.id?cc:'#00cc5515'}`,padding:'5px 8px',marginBottom:3}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:10,fontWeight:'bold',color:cc}}>{eq.symbol} {eq.name}</span>
                      <span style={{fontSize:8,padding:'1px 4px',background:THREAT_COLORS[eq.threat]+'22',color:THREAT_COLORS[eq.threat],border:`1px solid ${THREAT_COLORS[eq.threat]}44`}}>{eq.threat}</span>
                    </div>
                    <span style={{fontSize:9,color:'#00cc5566',marginBottom:2}}>{eq.type}</span>
                    <div style={{display:'flex',gap:4}}>
                      <button onClick={()=>{setSelEq(eq.id);setPlacing(true);}} style={{flex:1,background:'transparent',border:`1px solid ${cc}40`,color:cc+'aa',padding:'3px 0',cursor:'pointer',fontSize:8,fontFamily:"'Courier New'"}}>⊕ PLACE</button>
                      <button onClick={()=>setSimEq({...eq,category:selCat})} style={{flex:1,background:cc+'11',border:`1px solid ${cc}60`,color:cc,padding:'3px 0',cursor:'pointer',fontSize:8,fontFamily:"'Courier New'",fontWeight:'bold'}}>▶ SIMULATE</button>
                    </div>
                  </div>
                ))}
              </div>
              {placing&&selEq&&(
                <div style={{padding:'8px 10px',background:'#1a1a00',borderTop:'1px solid #ffdd0040',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#ffdd00',marginBottom:4}}>⊕ CLICK MAP TO PLACE</div>
                  <div style={{fontSize:9,color:'#ffdd0088'}}>{COUNTRIES[selCountry].equipment[selCat]?.find(q=>q.id===selEq)?.name}</div>
                  <button onClick={()=>{setPlacing(false);setSelEq(null);}} style={{marginTop:6,background:'transparent',border:'1px solid #ffdd0040',color:'#ffdd0088',padding:'2px 10px',cursor:'pointer',fontSize:9,fontFamily:"'Courier New'"}}>CANCEL</button>
                </div>
              )}
            </div>

            {/* Map */}
            <div style={{flex:1,position:'relative',overflow:'hidden'}}>
              <canvas ref={canvasRef} width={W} height={H} style={{width:'100%',height:'100%',cursor:placing?'crosshair':dragging?'grabbing':'default',display:'block'}}
                onClick={handleClick} onMouseDown={handleDown} onMouseMove={handleMove} onMouseUp={handleUp} onMouseLeave={handleUp} onWheel={handleWheel} />
              <div style={{position:'absolute',bottom:16,right:16,display:'flex',flexDirection:'column',gap:2}}>
                {[['＋',1.2],['－',0.8],['⌂',null]].map(([lbl,f],i)=>(
                  <button key={i} onClick={()=>f?setZoom(z=>Math.min(3,Math.max(.3,z*f))):(setZoom(1),setPan({x:0,y:0}))} style={{width:28,height:28,background:'#050d06',border:'1px solid #00cc5540',color:'#00cc55',cursor:'pointer',fontSize:14}}>{lbl}</button>
                ))}
              </div>
              <div style={{position:'absolute',bottom:16,left:16,background:'rgba(5,10,6,0.9)',border:'1px solid #00cc5530',padding:'6px 10px',fontSize:9}}>
                <div style={{color:'#00cc5566',marginBottom:4,letterSpacing:1}}>LEGEND</div>
                {Object.entries(THREAT_COLORS).map(([lvl,col])=>(
                  <div key={lvl} style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                    <span style={{width:8,height:8,background:col,display:'inline-block',borderRadius:'50%'}} />
                    <span style={{color:col}}>{lvl}</span>
                  </div>
                ))}
                <div style={{color:'#00cc5540',marginTop:4}}>ALT+DRAG pan | SCROLL zoom</div>
              </div>
            </div>

            {/* Right panel */}
            <div style={{width:220,background:'#050d06',borderLeft:'1px solid #00cc5520',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
              {selUnitObj?(
                <div style={{padding:'10px',borderBottom:'1px solid #00cc5520'}}>
                  <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>UNIT PROFILE</div>
                  <div style={{background:COUNTRIES[selUnitObj.country].color+'11',border:`1px solid ${COUNTRIES[selUnitObj.country].color}44`,padding:'8px'}}>
                    <div style={{fontSize:11,fontWeight:'bold',color:COUNTRIES[selUnitObj.country].color,marginBottom:4}}>{selUnitObj.symbol} {selUnitObj.name}</div>
                    <div style={{fontSize:9,color:'#00cc5566',marginBottom:2}}>{selUnitObj.type}</div>
                    {[['NATION',`${COUNTRIES[selUnitObj.country].flag} ${COUNTRIES[selUnitObj.country].name}`,COUNTRIES[selUnitObj.country].color],['THREAT',selUnitObj.threat,THREAT_COLORS[selUnitObj.threat]],['GRID',`${Math.round(selUnitObj.x)}.${Math.round(selUnitObj.y)}`,'#00cc55']].map(([k,v,c])=>(
                      <div key={k} style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                        <span style={{fontSize:9,color:'#00cc5566'}}>{k}</span><span style={{fontSize:9,color:c}}>{v}</span>
                      </div>
                    ))}
                    <button onClick={()=>setSimEq({...selUnitObj})} style={{marginTop:6,width:'100%',background:COUNTRIES[selUnitObj.country].color+'11',color:COUNTRIES[selUnitObj.country].color,border:`1px solid ${COUNTRIES[selUnitObj.country].color}40`,padding:'4px',cursor:'pointer',fontSize:9,fontFamily:"'Courier New'",marginBottom:4}}>▶ SIMULATE</button>
                    <button onClick={()=>removeUnit(selUnitObj.id)} style={{width:'100%',background:'#1a0a0a',color:'#ff4444',border:'1px solid #ff444440',padding:'4px',cursor:'pointer',fontSize:9,fontFamily:"'Courier New'"}}>REMOVE UNIT</button>
                  </div>
                </div>
              ):(
                <div style={{padding:'10px',borderBottom:'1px solid #00cc5520'}}>
                  <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2}}>UNIT PROFILE</div>
                  <div style={{fontSize:9,color:'#00cc5530',marginTop:8}}>Click a unit on the map to view details</div>
                </div>
              )}
              <div style={{padding:'8px 10px',borderBottom:'1px solid #00cc5520'}}>
                <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>ORDER OF BATTLE</div>
                {countsByCountry.filter(c=>c.count>0).length===0
                  ?<div style={{fontSize:9,color:'#00cc5530'}}>No units placed</div>
                  :countsByCountry.filter(c=>c.count>0).map(c=>(
                    <div key={c.key} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span>{c.flag}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,color:c.color}}>{c.name}</div>
                        <div style={{height:3,background:c.color+'44',marginTop:2}}><div style={{height:'100%',width:Math.min(100,c.count*10)+'%',background:c.color}} /></div>
                      </div>
                      <span style={{fontSize:10,color:c.color,fontWeight:'bold'}}>{c.count}</span>
                    </div>
                  ))
                }
              </div>
              <div style={{flex:1,overflow:'auto',padding:'6px 10px'}}>
                <div style={{fontSize:9,color:'#00cc5566',letterSpacing:2,marginBottom:6}}>ALL UNITS ({units.length})</div>
                {units.map(u=>(
                  <div key={u.id} onClick={()=>setSelUnit(u.id)} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,padding:'3px 5px',cursor:'pointer',background:selUnit===u.id?COUNTRIES[u.country].color+'22':'transparent',border:`1px solid ${selUnit===u.id?COUNTRIES[u.country].color+'44':'transparent'}`}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:THREAT_COLORS[u.threat],flexShrink:0}} />
                    <span style={{fontSize:9,color:COUNTRIES[u.country].color,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.symbol} {u.name}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {simEq&&<WeaponSimulation equipment={simEq} country={selCountry} onClose={()=>setSimEq(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
