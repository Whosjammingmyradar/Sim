class Ptcl{
  constructor(x,y,vx,vy,life,color,size=2){Object.assign(this,{x,y,vx,vy,life,maxLife:life,color,size});}
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.04;this.vx*=.97;this.vy*=.97;this.life--;}
  draw(ctx){const a=this.life/this.maxLife;ctx.globalAlpha=a*.9;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.size*a),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  get dead(){return this.life<=0;}
}
function burst(P,x,y,c1,c2,n=50){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*5+.5;P.push(new Ptcl(x,y,Math.cos(a)*s,Math.sin(a)*s,Math.random()*35+15,Math.random()>.5?c1:c2,Math.random()*3+.5));}}
function smk(P,x,y,c='#aaa8'){P.push(new Ptcl(x+(Math.random()-.5)*3,y+(Math.random()-.5)*3,(Math.random()-.5)*.4,-Math.random()*.2,Math.random()*25+10,c,Math.random()*3+1.5));}

// ── MAP DRAWING ──────────────────────────────────────────────────
function drawMap(ctx,W,H,ox,oy,zoom){
  ctx.save();
  ctx.translate(ox,oy);
  ctx.scale(zoom,zoom);

  // Deep ocean
  const og=ctx.createLinearGradient(0,0,W,H);
  og.addColorStop(0,'#03090f');og.addColorStop(.5,'#040c16');og.addColorStop(1,'#030a14');
  ctx.fillStyle=og;ctx.fillRect(-W,-H,W*3,H*3);

  // Ocean depth blobs
  [[W*.1,H*.6,W*.4],[W*.6,H*.3,W*.35],[W*.35,H*.8,W*.45],[W*.8,H*.7,W*.3]].forEach(([cx,cy,r])=>{
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(0,15,40,0.5)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  });

  const land=(pts,shade1='#0e2010',shade2='#0a1a0c')=>{
    // Shore glow
    ctx.shadowBlur=20;ctx.shadowColor='rgba(0,50,80,0.25)';
    ctx.fillStyle='rgba(0,35,70,0.12)';
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;
    // Land fill
    const g=ctx.createLinearGradient(pts[0][0],pts[0][1],pts[Math.floor(pts.length/2)][0],pts[Math.floor(pts.length/2)][1]);
    g.addColorStop(0,shade1);g.addColorStop(1,shade2);
    ctx.fillStyle=g;
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
    ctx.closePath();ctx.fill();
    // Coastline
    ctx.strokeStyle='rgba(25,80,45,0.55)';ctx.lineWidth=1.2/zoom;
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
    ctx.closePath();ctx.stroke();
    // Interior terrain texture
    for(let i=0;i<5;i++){
      const tx=pts[0][0]+(Math.random()-.5)*W*.25,ty=pts[0][1]+(Math.random()-.5)*H*.18,tr=W*(.025+Math.random()*.05);
      const tg=ctx.createRadialGradient(tx,ty,0,tx,ty,tr);
      tg.addColorStop(0,'rgba(3,10,3,0.55)');tg.addColorStop(1,'transparent');
      ctx.fillStyle=tg;ctx.beginPath();ctx.arc(tx,ty,tr,0,Math.PI*2);ctx.fill();
    }
  };

  // ── Scandinavia ──
  land([[W*.06,0],[W*.27,0],[W*.30,H*.07],[W*.28,H*.14],[W*.25,H*.20],
    [W*.28,H*.28],[W*.26,H*.36],[W*.21,H*.41],[W*.17,H*.44],
    [W*.13,H*.42],[W*.10,H*.36],[W*.08,H*.30],[W*.05,H*.22],[W*.03,H*.13],[W*.06,0]],'#0f2212','#0b1c0e');

  // ── Finland / Karelia ──
  land([[W*.28,0],[W*.52,0],[W*.54,H*.04],[W*.56,H*.11],
    [W*.52,H*.17],[W*.49,H*.24],[W*.45,H*.29],[W*.41,H*.27],
    [W*.37,H*.21],[W*.33,H*.15],[W*.31,H*.09],[W*.29,H*.04],[W*.28,0]],'#102214','#0c1a10');

  // ── Baltic States + Belarus coast ──
  land([[W*.52,0],[W*.72,0],[W*.74,H*.07],[W*.72,H*.13],
    [W*.68,H*.19],[W*.64,H*.22],[W*.60,H*.25],[W*.56,H*.27],
    [W*.53,H*.24],[W*.51,H*.18],[W*.50,H*.12],[W*.51,H*.06],[W*.52,0]],'#0e2010','#0a1a0c');

  // ── Russia east coast ──
  land([[W*.70,0],[W,0],[W,H*.7],[W*.94,H*.65],[W*.90,H*.58],
    [W*.86,H*.50],[W*.83,H*.42],[W*.80,H*.34],[W*.76,H*.26],
    [W*.74,H*.19],[W*.72,H*.13],[W*.72,H*.07],[W*.70,0]],'#0e2010','#091809');

  // ── Central Europe / Poland coast ──
  land([[W*.04,H*.53],[W*.37,H*.53],[W*.39,H*.57],[W*.37,H*.63],
    [W*.31,H*.67],[W*.25,H*.69],[W*.19,H*.67],[W*.13,H*.63],
    [W*.08,H*.58],[W*.05,H*.55],[W*.04,H*.53]],'#0f2112','#0b1c0e');

  // ── Denmark ──
  land([[W*.22,H*.31],[W*.26,H*.29],[W*.27,H*.35],[W*.25,H*.40],
    [W*.21,H*.42],[W*.18,H*.38],[W*.20,H*.33],[W*.22,H*.31]]);

  // ── Various islands ──
  [[W*.18,H*.17,W*.04],[W*.38,H*.34,W*.03],[W*.60,H*.30,W*.025],
   [W*.08,H*.43,W*.025],[W*.44,H*.44,W*.02],[W*.30,H*.47,W*.018]].forEach(([ix,iy,ir])=>{
    const pts=Array.from({length:8},(_,i)=>{const a=i/8*Math.PI*2,nr=ir*(.7+Math.random()*.5);return[ix+Math.cos(a)*nr,iy+Math.sin(a)*nr];});
    land(pts);
  });

  // Ocean wave lines
  ctx.strokeStyle='rgba(15,60,120,0.07)';ctx.lineWidth=.7/zoom;
  [[H*.32,W*.0,W],[H*.42,W*.0,W],[H*.52,W*.0,W],[H*.62,W*.0,W],
   [H*.18,W*.3,W*.72],[H*.24,W*.15,W*.6]].forEach(([wy,x0,x1])=>{
    ctx.beginPath();
    for(let x=x0;x<=x1;x+=5){const v=Math.sin(x*.028)*4+Math.sin(x*.051)*2;x===x0?ctx.moveTo(x,wy+v):ctx.lineTo(x,wy+v);}
    ctx.stroke();
  });

  // Tactical grid
  ctx.strokeStyle='rgba(35,130,170,0.06)';ctx.lineWidth=.4/zoom;
  for(let x=0;x<=W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(35,130,170,0.13)';ctx.lineWidth=.7/zoom;
  for(let x=0;x<=W;x+=180){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=180){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Coord labels
  ctx.fillStyle='rgba(40,155,195,0.28)';ctx.font=`${8/zoom}px 'Courier New'`;ctx.textBaseline='top';ctx.textAlign='left';
  for(let gx=0;gx<=W;gx+=180)for(let gy=0;gy<=H;gy+=180){
    ctx.fillText(`${(62-gy/12).toFixed(0)}N`+` ${(8+gx/18).toFixed(0)}E`,gx+3/zoom,gy+2/zoom);
  }

  // City markers
  [[W*.225,H*.375,'Stockholm'],[W*.42,H*.455,'Helsinki'],[W*.555,H*.495,'Tallinn'],
   [W*.60,H*.555,'Riga'],[W*.625,H*.615,'Vilnius'],[W*.745,H*.60,'Kaliningrad'],
   [W*.165,H*.615,'Copenhagen'],[W*.295,H*.62,'Gdańsk'],[W*.485,H*.505,'Turku']].forEach(([cx,cy,n])=>{
    ctx.fillStyle='rgba(80,200,140,0.55)';ctx.beginPath();ctx.arc(cx,cy,2.5/zoom,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(80,200,140,0.4)';ctx.font=`${7.5/zoom}px 'Courier New'`;ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(n,cx,cy-5/zoom);
  });

  ctx.restore();
}

// ── ON-MAP SIMULATIONS ────────────────────────────────────────────
function runSim(type,ctx,st,t,x,y,color){
  if(!st.P) st.P=[];
  const P=st.P;
  let done=false;

  if(type==='ballistic'){
    const dur=200,prog=Math.min(t/dur,1);
    if(!st.tx){const d=Math.random()>.5?1:-1;st.tx=x+d*(200+Math.random()*80);st.ty=y+(Math.random()*50-25);}
    const mx=x+(st.tx-x)*prog,arc=-Math.sin(prog*Math.PI)*150;
    const my=y+(st.ty-y)*prog+arc;
    if(t%2===0&&prog<.94){smk(P,mx,my,'#ff6500cc');smk(P,mx,my,'#ffaa0055');}
    P.forEach(p=>p.update());P.forEach(p=>p.draw(ctx));st.P=P.filter(p=>!p.dead);
    if(prog>.96&&!st.ex){st.ex=true;burst(P,st.tx,st.ty,'#ff4400','#ffcc00',70);burst(P,st.tx,st.ty,'#fff','#ff8800',30);}
    if(prog<.94){
      const pp=Math.max(0,prog-.01);
      const pmx=x+(st.tx-x)*pp,pmy=y+(st.ty-y)*pp-Math.sin(pp*Math.PI)*150;
      ctx.save();ctx.translate(mx,my);ctx.rotate(Math.atan2(my-pmy,mx-pmx));
      const eg=ctx.createRadialGradient(-10,0,0,-10,0,12);eg.addColorStop(0,'#ff8800bb');eg.addColorStop(1,'transparent');
      ctx.fillStyle=eg;ctx.beginPath();ctx.arc(-10,0,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(9,0);ctx.lineTo(-6,-3);ctx.lineTo(-6,3);ctx.closePath();ctx.fill();
      ctx.fillStyle=color+'aa';ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-11,-5);ctx.lineTo(-11,5);ctx.closePath();ctx.fill();
      ctx.restore();
    }
    ctx.setLineDash([4,6]);ctx.strokeStyle=color+'25';ctx.lineWidth=1;ctx.beginPath();
    for(let p=0;p<=1;p+=.02){const px=x+(st.tx-x)*p,py=y+(st.ty-y)*p-Math.sin(p*Math.PI)*150;p===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
    ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`ALT ${Math.round(Math.max(0,Math.sin(prog*Math.PI))*90)}km  ${Math.round(prog*480)}km`,x,y-16);
    if(prog>=1&&P.length===0) done=true;
  }

  else if(type==='cruise'){
    if(!st.path){st.path=[];const dir=Math.random()>.5?1:-1;for(let i=0;i<=100;i++){st.path.push([x+dir*(250*(i/100)),y+Math.sin(i*.1)*25+Math.sin(i*.19)*10]);}}

    ctx.setLineDash([3,5]);ctx.strokeStyle=color+'1a';ctx.lineWidth=1;ctx.beginPath();

    if(prog<.96){const next=st.path[Math.min(idx+1,st.path.length-1)];

      ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(9,0);ctx.lineTo(-6,-3);ctx.lineTo(-6,3);ctx.closePath();ctx.fill();
      ctx.fillStyle=color+'bb';ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-3,-8);ctx.lineTo(-5,0);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-3,8);ctx.lineTo(-5,0);ctx.closePath();ctx.fill();ctx.restore();}
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`NOE ${Math.round(40+Math.sin(t*.08)*12)}m  ${Math.round(prog*100)}%`,x,y-16);
    if(prog>=1&&P.length===0) done=true;
  }

  else if(type==='sam'){
    const dur=160,p=t/dur;
    if(!st.tx){const d=Math.random()>.5?1:-1;st.tx=x+d*(160+Math.random()*60);st.ty=y-150;}
    const tx=st.tx+(x-st.tx)*Math.min(p*1.8,1),ty=st.ty+(y-st.ty)*Math.min(p*1.8,1);

    if(t>35&&samP<.97) smk(P,sx,sy,'#00ccffaa');
    P.forEach(p2=>p2.update());P.forEach(p2=>p2.draw(ctx));st.P=P.filter(p2=>!p2.dead);
    const hit=samP>.95;if(hit&&!st.ex){st.ex=true;burst(P,ix,iy,'#fff','#ffcc00',60);}
    // Radar sweep rings
    const sw=(t*2.5)%360*Math.PI/180;
    ctx.save();ctx.translate(x,y);
    for(let i=0;i<20;i++){const a=sw-i*.06;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,85,a-.06,a);ctx.closePath();ctx.fillStyle=color+Math.floor((20-i)*5).toString(16).padStart(2,'0');ctx.fill();}
    [38,75].forEach(r=>{ctx.strokeStyle=color+'1a';ctx.lineWidth=.6;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();});
    ctx.restore();
    if(!hit){ctx.fillStyle='#ff3333';ctx.shadowBlur=6;ctx.shadowColor='#ff3333';ctx.beginPath();ctx.arc(tx,ty,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    if(t>35&&samP<.96){ctx.fillStyle=color;ctx.shadowBlur=8;ctx.shadowColor=color;ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(st.ex?'✓ INTERCEPT CONFIRMED':'TRACKING INBOUND',x,y-16);
    if(hit&&P.length===0) done=true;
  }

  else if(type==='radar'){
    const sw=(t*1.8)%360*Math.PI/180;
    if(!st.blips) st.blips=[{a:.4,d:.58},{a:1.9,d:.44},{a:3.1,d:.7},{a:4.7,d:.5},{a:5.5,d:.35}].map(b=>({...b,age:0}));
    ctx.save();ctx.translate(x,y);
    [45,95,145].forEach(r=>{ctx.strokeStyle=color+'18';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();});
    ctx.strokeStyle=color+'0d';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,-160);ctx.lineTo(0,160);ctx.stroke();ctx.beginPath();ctx.moveTo(-160,0);ctx.lineTo(160,0);ctx.stroke();
    for(let i=0;i<25;i++){const a=sw-i*.055;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,145,a-.055,a);ctx.closePath();ctx.fillStyle=color+Math.floor((25-i)*4).toString(16).padStart(2,'0');ctx.fill();}
    ctx.strokeStyle=color+'cc';ctx.lineWidth=1.5;ctx.shadowBlur=6;ctx.shadowColor=color;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sw)*145,Math.sin(sw)*145);ctx.stroke();ctx.shadowBlur=0;
    st.blips.forEach(b=>{const diff=((sw-b.a)*180/Math.PI+360)%360;if(diff<8) b.age=55;
      if(b.age>0){b.age--;const al=b.age/55,bx=Math.cos(b.a)*145*b.d,by=Math.sin(b.a)*145*b.d;
        ctx.globalAlpha=al;ctx.fillStyle='#ff3333';ctx.shadowBlur=8;ctx.shadowColor='#ff3333';
        ctx.beginPath();ctx.arc(bx,by,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}});
    ctx.fillStyle=color;ctx.shadowBlur=10;ctx.shadowColor=color;ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.restore();
    const ac=st.blips.filter(b=>b.age>0).length;
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`CONTACTS: ${ac}  ${Math.round((sw*180/Math.PI+360)%360)}°`,x,y-16);
    // radar loops
  }

  else if(type==='dogfight'){
    if(!st.stars) st.stars=Array.from({length:25},()=>({x:x+(Math.random()-.5)*350,y:y+(Math.random()-.5)*280,r:Math.random()*1.1}));
    st.stars.forEach(s=>{ctx.fillStyle=`rgba(200,220,255,${.18+Math.sin(t*.06+s.r*8)*.12})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    const fx=x+Math.sin(t*.04)*110+Math.cos(t*.026)*55,fy=y+Math.cos(t*.05)*75+Math.sin(t*.031)*38;
    const ex=x-Math.sin(t*.038)*95+Math.cos(t*.029)*48,ey=y-Math.cos(t*.047)*68+Math.sin(t*.034)*33;
    if(t%3===0){smk(P,fx,fy,'#fff2');if(!st.kill) smk(P,ex,ey,'#ff220022');}
    if(!st.fired&&t>80){st.fired=true;st.mx=fx;st.my=fy;}
    if(st.fired&&!st.kill){const mp=Math.min(1,(t-80)/55);st.mx=fx+(ex-fx)*mp;st.my=fy+(ey-fy)*mp;smk(P,st.mx,st.my,'#00ccff77');if(mp>.94){st.kill=true;burst(P,st.mx,st.my,'#ff4400','#ffcc00',70);}if(!st.kill){ctx.fillStyle='#00ccff';ctx.shadowBlur=5;ctx.shadowColor='#00ccff';ctx.beginPath();ctx.arc(st.mx,st.my,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
    P.forEach(p=>p.update());P.forEach(p=>p.draw(ctx));st.P=P.filter(p=>!p.dead);
    [[fx,fy,color,'FRDLY'],[!st.kill?ex:null,!st.kill?ey:null,'#ff3333','HSTL']].forEach(([px,py,pc,lbl])=>{
      if(px==null) return;
      ctx.save();ctx.translate(px,py);const ang=Math.atan2(py-y,px-x);ctx.rotate(ang);
      ctx.shadowBlur=5;ctx.shadowColor=pc;ctx.fillStyle=pc;
      ctx.beginPath();ctx.moveTo(11,0);ctx.lineTo(-7,-2.5);ctx.lineTo(-9,0);ctx.lineTo(-7,2.5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-4,-11);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-4,11);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
      ctx.fillStyle=pc+'aa';ctx.font="8px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(lbl,px,py-14);
    });
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(st.kill?'✓ FOX-3 SPLASH':t>80?'FOX-3 AWAY':'RADAR LOCK',x,y-16);
    if(st.kill&&P.length===0) done=true;
  }

  else if(type==='naval'){
    if(!st.tx){const d=Math.random()>.5?1:-1;st.tx=x+d*(220+Math.random()*60);st.ty=y+(Math.random()*60-30);}
    const ds=(sx,sy,sc)=>{ctx.fillStyle=sc+'bb';ctx.beginPath();ctx.moveTo(sx-32,sy+5);ctx.lineTo(sx+32,sy+5);ctx.lineTo(sx+38,sy+12);ctx.lineTo(sx-38,sy+12);ctx.closePath();ctx.fill();ctx.fillRect(sx-13,sy-7,26,12);ctx.fillRect(sx-5,sy-16,10,9);ctx.strokeStyle=sc;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy-16);ctx.lineTo(sx,sy-28);ctx.stroke();ctx.beginPath();ctx.moveTo(sx-9,sy-23);ctx.lineTo(sx+9,sy-23);ctx.stroke();};
    ds(x,y,color);if(!st.kill) ds(st.tx,st.ty,'#ff3333');

    P.forEach(p=>p.update());P.forEach(p=>p.draw(ctx));st.P=P.filter(p=>!p.dead);
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`SALVO ${st.salvo.filter(m=>m.hit).length}/3  ${st.kill?'✓ TARGET HIT':'TRACKING'}`,x,y-36);
    if(st.kill&&P.length===0) done=true;
  }

  else if(type==='stealth'){
    if(!st.radars) st.radars=[{ox:x+140,oy:y+55,sw:0,spd:1.4},{ox:x+250,oy:y-35,sw:110,spd:-.95}];
    st.radars.forEach(r=>{r.sw=(r.sw+r.spd)%360;const a=r.sw*Math.PI/180;ctx.save();ctx.translate(r.ox,r.oy);ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,75,a-.38,a);ctx.closePath();ctx.fillStyle='#ff333312';ctx.fill();ctx.strokeStyle='#ff333328';ctx.lineWidth=1;ctx.stroke();[38,75].forEach(rr=>{ctx.strokeStyle='#ff333315';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();});ctx.restore();ctx.fillStyle='#ff3333aa';ctx.fillRect(r.ox-3,r.oy-8,6,8);});
    const dur=190,p=Math.min(t/dur,1);
    const wpts=[[x,y],[x+75,y-28],[x+145,y-45],[x+215,y-18],[x+290,y+18],[x+345,y+8]];
    const si=Math.min(wpts.length-2,Math.floor(p*(wpts.length-1)));const sp=(p*(wpts.length-1))-si;
    const [fx,fy]=wpts[si],to=wpts[Math.min(si+1,wpts.length-1)];
    const mx=fx+(to[0]-fx)*sp,my=fy+(to[1]-fy)*sp;

    P.forEach(pp=>pp.update());P.forEach(pp=>pp.draw(ctx));st.P=P.filter(pp=>!pp.dead);
    if(p>.88&&!st.ex){st.ex=true;burst(P,wpts[wpts.length-1][0],wpts[wpts.length-1][1],'#ff4400','#ffcc00',80);}
    ctx.setLineDash([2,8]);ctx.strokeStyle=color+'12';ctx.lineWidth=1;ctx.beginPath();wpts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));ctx.stroke();ctx.setLineDash([]);
    if(p<.94){const ang=Math.atan2(to[1]-fy,to[0]-fx);ctx.save();ctx.translate(mx,my);ctx.rotate(ang);ctx.fillStyle=color+'ee';ctx.shadowBlur=2;ctx.shadowColor=color;ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-8,-13);ctx.lineTo(-10,0);ctx.lineTo(-8,13);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.restore();}
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`RCS <0.001m²  ${st.ex?'✓ TARGET DESTROYED':'UNDETECTED'}`,x,y-16);
    if(st.ex&&P.length===0) done=true;
  }

  else if(type==='antiship'){
    if(!st.tx){const d=Math.random()>.5?1:-1;st.tx=x+d*(260+Math.random()*60);st.ty=y+(Math.random()*40-20);}
    const dur=190,p=Math.min(t/dur,1);
    const mx=x+(st.tx-x)*p,popUp=p>.7?Math.sin((p-.7)/.3*Math.PI)*35:0,my=y+(st.ty-y)*p-popUp;
    if(t%2===0&&p<.95){smk(P,mx,my,'#aaa4');smk(P,mx,my,'#ff880033');}
    P.forEach(pp=>pp.update());P.forEach(pp=>pp.draw(ctx));st.P=P.filter(pp=>!pp.dead);
    if(p>.94&&!st.ex){st.ex=true;burst(P,st.tx,st.ty,'#ff4400','#ffcc00',85);}
    if(!st.ex){ctx.fillStyle='#ff3333aa';ctx.fillRect(st.tx-30,st.ty,60,12);ctx.fillRect(st.tx-22,st.ty-9,44,9);ctx.fillStyle='#ff3333';ctx.fillRect(st.tx-5,st.ty-17,10,8);}
    if(p<.94){ctx.fillStyle=color;ctx.shadowBlur=8;ctx.shadowColor=color;ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=color+'25';ctx.lineWidth=.7;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx,st.ty);ctx.stroke();ctx.setLineDash([]);}
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`SEA-SKIM ${Math.max(5,Math.round(15-p*12))}m  ${st.ex?'✓ DIRECT HIT':'TERMINAL'}`,x,y-16);
    if(st.ex&&P.length===0) done=true;
  }

  else if(type==='helicopter'){
    const ra=t*.26;
    ctx.save();ctx.translate(x,y-14);ctx.strokeStyle=color+'cc';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(Math.cos(ra)*24,Math.sin(ra)*7);ctx.lineTo(Math.cos(ra+Math.PI)*24,Math.sin(ra+Math.PI)*7);ctx.stroke();ctx.restore();
    ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(x,y,17,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillRect(x+15,y-2,14,3);ctx.fillStyle=color+'88';ctx.beginPath();ctx.arc(x-5,y-5,5,0,Math.PI*2);ctx.fill();
    if(t%2===0) P.push(new Ptcl(x+(Math.random()-.5)*28,y+8,(Math.random()-.5)*2,Math.random()*.7,14,'#8B735555',2.2));
    if(!st.tgts) st.tgts=[{x:x+130,y:y+18,alive:true},{x:x+185,y:y+8,alive:true},{x:x+155,y:y+45,alive:true}];
    [55,105,155].forEach((ft,i)=>{
      if(t===ft) st['m'+i]={x,y,hit:false};
      const m=st['m'+i];if(!m) return;
      if(!m.hit){const mp=Math.min(1,(t-ft)/42);m.x=x+(st.tgts[i].x-x)*mp;m.y=y+(st.tgts[i].y-y)*mp;smk(P,m.x,m.y,'#ff880066');if(mp>.93&&st.tgts[i].alive){m.hit=true;st.tgts[i].alive=false;burst(P,st.tgts[i].x,st.tgts[i].y,'#ff4400','#ffcc00',50);}if(!m.hit){ctx.fillStyle=color;ctx.beginPath();ctx.arc(m.x,m.y,2.5,0,Math.PI*2);ctx.fill();}}
    });
    st.tgts.forEach(tg=>{if(tg.alive){ctx.fillStyle='#ff3333aa';ctx.fillRect(tg.x-9,tg.y-4,18,8);ctx.fillRect(tg.x-3,tg.y-9,6,5);}});
    P.forEach(p=>p.update());P.forEach(p=>p.draw(ctx));st.P=P.filter(p=>!p.dead);
    const kl=st.tgts.filter(tg=>!tg.alive).length;
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`ATGM ${[55,105,155].filter(ft=>t>ft).length}/3  K:${kl}/3`,x,y-22);
    if(kl===3&&P.length===0) done=true;
  }

  else if(type==='armor'){
    if(!st.units) st.units=Array.from({length:4},(_,i)=>({x:x+i*16-24,y:y+(i-1.5)*11,off:i*.7}));
    st.units.forEach((u,i)=>{u.x=Math.min(x+240,u.x+.85+Math.sin(t*.06+u.off)*.25);u.y=y+(i-1.5)*11+Math.sin(t*.04+u.off)*4;if(t%3===0) P.push(new Ptcl(u.x-10,u.y+5,(Math.random()-.5)*1.3,Math.random()*.45,18,'#8B735555',2));
      ctx.save();ctx.translate(u.x,u.y);ctx.fillStyle=color+'cc';ctx.fillRect(-11,-5,22,10);ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,-1,5,0,Math.PI*2);ctx.fill();ctx.fillRect(5,-1.5,9,3);ctx.fillStyle=color+'88';ctx.fillRect(-11,5,22,3);ctx.restore();});
    if(!st.enemies) st.enemies=[{x:x+165,y:y-9,alive:true},{x:x+205,y:y+9,alive:true},{x:x+185,y:y+32,alive:true}];
    st.enemies.forEach(e=>{const n=st.units[st.units.length-1];if(n.x>e.x-55&&e.alive){e.alive=false;burst(P,e.x,e.y,'#ff4400','#ffcc00',40);}if(e.alive){ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle='#ff3333cc';ctx.fillRect(-11,-5,22,10);ctx.beginPath();ctx.arc(0,-1,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff3333';ctx.fillRect(5,-1.5,9,3);ctx.restore();}});
    if(t%42===0&&st.units[st.units.length-1].x<x+185) burst(P,st.units[0].x+12,st.units[0].y,'#ffff00','#ff8800',10);
    P.forEach(p=>p.update());P.forEach(p=>p.draw(ctx));st.P=P.filter(p=>!p.dead);
    ctx.fillStyle=color;ctx.font="bold 9px 'Courier New'";ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`ADV ${Math.min(100,Math.round((st.units[0].x-x)/2.4))}%  K:${st.enemies.filter(e=>!e.alive).length}/3`,x,y-20);
    if(st.enemies.filter(e=>!e.alive).length===3&&P.length===0) done=true;
  }

  return done;
}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const cvs=useRef(null);
  const raf=useRef(null);
  const [units,setUnits]=useState([]);
  const [selCtry,setSelCtry]=useState('russia');
  const [selCat,setSelCat]=useState('aircraft');
  const [placing,setPlacing]=useState(null);
  const [selUnit,setSelUnit]=useState(null);
  const [dragging,setDragging]=useState(null);
  const [pan,setPan]=useState({x:0,y:0});
  const [zoom,setZoom]=useState(1);
  const [panning,setPanning]=useState(false);
  const [lastP,setLastP]=useState(null);
  const [briefing,setBriefing]=useState(false);
  const [scenario,setScenario]=useState('Baltic Sea Theater');
  const [activeSim,setActiveSim]=useState(null);

  const W=900,H=620;
  const unitsR=useRef(units);
  const selR=useRef(selUnit);
  const placingR=useRef(placing);
  const selCtryR=useRef(selCtry);
  const simR=useRef(activeSim);
  useEffect(()=>{unitsR.current=units;},[units]);
  useEffect(()=>{selR.current=selUnit;},[selUnit]);
  useEffect(()=>{placingR.current=placing;},[placing]);
  useEffect(()=>{selCtryR.current=selCtry;},[selCtry]);
  useEffect(()=>{simR.current=activeSim;},[activeSim]);

  const render=useCallback(()=>{
    const canvas=cvs.current;if(!canvas) return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);

    // Base map
    drawMap(ctx,W,H,pan.x,pan.y,zoom);

    ctx.save();
    ctx.translate(pan.x,pan.y);
    ctx.scale(zoom,zoom);

    const us=unitsR.current;
    const su=selR.current;
    const sim=simR.current;

    // Range rings
    if(su){const u=us.find(u=>u.id===su);if(u){[55,115,200].forEach((r,i)=>{ctx.strokeStyle=TC[u.threat]+['33','22','14'][i];ctx.lineWidth=.8/zoom;ctx.setLineDash([3/zoom,4/zoom]);ctx.beginPath();ctx.arc(u.x,u.y,r,0,Math.PI*2);ctx.stroke();});ctx.setLineDash([]);}}

    // Active sim
    if(sim){
      const u=us.find(u=>u.id===sim.unitId);
      if(u){
        // Area glow
        const bg=ctx.createRadialGradient(u.x,u.y,15,u.x,u.y,180);
        bg.addColorStop(0,sim.color+'14');bg.addColorStop(1,'transparent');
        ctx.fillStyle=bg;ctx.beginPath();ctx.arc(u.x,u.y,180,0,Math.PI*2);ctx.fill();
        const done=runSim(sim.type,ctx,sim.state,sim.t,u.x,u.y,sim.color);
        sim.t++;
        if(done&&sim.type!=='radar'){sim.t=0;Object.keys(sim.state).forEach(k=>{if(k!=='P') delete sim.state[k];});sim.state.P=[];}
      }
    }

    // Units
    us.forEach(unit=>{
      const isSel=unit.id===su;
      const cc=COUNTRIES[unit.country].color;
      const tc=TC[unit.threat];
      const r=isSel?13:9;
      ctx.shadowBlur=isSel?16:7;ctx.shadowColor=cc;
      // Hex marker
      ctx.strokeStyle=isSel?'#fff':tc;ctx.lineWidth=(isSel?2:1.2)/zoom;
      ctx.fillStyle=isSel?cc:cc+'cc';
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(unit.x+r*Math.cos(a)/zoom*zoom,unit.y+r*Math.sin(a)/zoom*zoom);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      // Icon
      ctx.fillStyle='#fff';ctx.font=`bold ${(isSel?9:8)/zoom*zoom}px 'Courier New'`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(unit.sym,unit.x,unit.y);
      // Threat dot
      ctx.fillStyle=tc;ctx.shadowBlur=4;ctx.shadowColor=tc;
      ctx.beginPath();ctx.arc(unit.x+r*.72,unit.y-r*.72,2.2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      // Label
      if(zoom>0.55){
        ctx.font=`bold ${8/zoom}px 'Courier New'`;
        const lw=ctx.measureText(unit.name).width;
        ctx.fillStyle='rgba(2,5,10,0.85)';ctx.fillRect(unit.x+r+3/zoom,unit.y-6/zoom,lw+5/zoom,12/zoom);
        ctx.strokeStyle=cc+'44';ctx.lineWidth=.4/zoom;ctx.strokeRect(unit.x+r+3/zoom,unit.y-6/zoom,lw+5/zoom,12/zoom);
        ctx.fillStyle=cc;ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(unit.name,unit.x+r+5/zoom,unit.y-5/zoom);
      }
      // Sim ring
      if(sim&&sim.unitId===unit.id){ctx.strokeStyle=cc+'70';ctx.lineWidth=1.5/zoom;ctx.setLineDash([3/zoom,3/zoom]);ctx.beginPath();ctx.arc(unit.x,unit.y,r+7/zoom,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    });

    // Placing crosshair
    if(placingR.current){const cc=COUNTRIES[selCtryR.current].color;ctx.strokeStyle=cc+'44';ctx.lineWidth=.8/zoom;ctx.setLineDash([3/zoom,5/zoom]);ctx.beginPath();ctx.moveTo(W/2/zoom/zoom,0);ctx.lineTo(W/2/zoom/zoom,H/zoom);ctx.stroke();ctx.beginPath();ctx.moveTo(0,H/2/zoom/zoom);ctx.lineTo(W/zoom,H/2/zoom/zoom);ctx.stroke();ctx.setLineDash([]);}

    ctx.restore();

    // Briefing bar
    if(briefing){ctx.fillStyle='rgba(2,5,10,0.9)';ctx.fillRect(0,0,W,36);ctx.fillStyle='#4af';ctx.font="bold 10px 'Courier New'";ctx.textAlign='center';ctx.fillText(`⬛ CLASSIFIED  //  INTEL BRIEFING  //  ${scenario.toUpperCase()}  //  ${new Date().toUTCString().replace('GMT','Z')}`,W/2,22);ctx.strokeStyle='#4af22';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,36);ctx.lineTo(W,36);ctx.stroke();}

    raf.current=requestAnimationFrame(render);
  },[pan,zoom,briefing,scenario]);

  useEffect(()=>{raf.current=requestAnimationFrame(render);return()=>cancelAnimationFrame(raf.current);},[render]);

  const toMap=e=>{const r=cvs.current.getBoundingClientRect();return{x:((e.clientX-r.left)*(W/r.width)-pan.x)/zoom,y:((e.clientY-r.top)*(H/r.height)-pan.y)/zoom};};
  const onClick=e=>{
    if(panning) return;
    const{x,y}=toMap(e);
    if(placingR.current){const eq=placingR.current;setUnits(p=>[...p,{id:UID++,country:selCtryR.current,sym:eq.sym,...eq,x,y}]);return;}
    let hit=null;unitsR.current.forEach(u=>{if(Math.hypot(u.x-x,u.y-y)<14) hit=u.id;});setSelUnit(hit);
  };
  const onDown=e=>{
    if(e.button===1||e.altKey){setPanning(true);setLastP({x:e.clientX,y:e.clientY});e.preventDefault();return;}
    const{x,y}=toMap(e);unitsR.current.forEach(u=>{if(Math.hypot(u.x-x,u.y-y)<14&&!placingR.current) setDragging(u.id);});
  };
  const onMove=e=>{
    if(panning&&lastP){setPan(p=>({x:p.x+e.clientX-lastP.x,y:p.y+e.clientY-lastP.y}));setLastP({x:e.clientX,y:e.clientY});}
    if(dragging!==null){const{x,y}=toMap(e);setUnits(p=>p.map(u=>u.id===dragging?{...u,x,y}:u));}
  };
  const onUp=()=>{setPanning(false);setLastP(null);setDragging(null);};
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.min(4,Math.max(.22,z*(e.deltaY>0?.87:1.14))));};

  const startSim=(eq,ctry)=>{
    let tid=null;
    const existing=unitsR.current.find(u=>u.id===eq.id||u.name===eq.name);
    if(existing){tid=existing.id;}
    else{
      const nid=UID++;
      const cx=(W*.45-pan.x)/zoom,cy=(H*.42-pan.y)/zoom;
      setUnits(p=>[...p,{id:nid,country:ctry,sym:eq.sym,...eq,x:cx,y:cy}]);
      tid=nid;
    }
    setActiveSim({unitId:tid,type:getSimType(eq.id),state:{P:[]},t:0,color:COUNTRIES[ctry].color});
    setSelUnit(tid);
  };

  const selUO=units.find(u=>u.id===selUnit);
  const cc=COUNTRIES[selCtry].color;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',width:'100vw',background:'#050810',color:'#4af',fontFamily:"'Courier New',monospace",overflow:'hidden',userSelect:'none'}}>

      {/* TOP BAR */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 14px',background:'#030609',borderBottom:'1px solid #0d2030',flexShrink:0,height:34}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{color:'#ff3333',fontSize:8,letterSpacing:3,fontWeight:'bold'}}>⬛ CLASSIFIED</span>
          <span style={{color:'#6cf',fontSize:11,fontWeight:'bold',letterSpacing:2}}>TACTICAL INTELLIGENCE PLATFORM</span>
          <span style={{color:'#2a6a8a',fontSize:8}}>v3.0 // TRAINING USE ONLY</span>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <input value={scenario} onChange={e=>setScenario(e.target.value)}
            style={{background:'#030c14',border:'1px solid #0d2030',color:'#4af',padding:'2px 7px',fontSize:9,width:190,outline:'none'}}/>
          <button onClick={()=>setBriefing(b=>!b)}
            style={{background:briefing?'#4af':'transparent',color:briefing?'#000':'#4af',border:'1px solid #4af44',padding:'2px 9px',fontSize:8,letterSpacing:1}}>
            {briefing?'● BRIEFING':'○ BRIEFING'}
          </button>
          {activeSim&&<button onClick={()=>setActiveSim(null)}
            style={{background:'#140a00',color:'#ff8800',border:'1px solid #ff880040',padding:'2px 9px',fontSize:8}}>
            ■ END SIM
          </button>}
          <button onClick={()=>{setUnits([]);setSelUnit(null);setActiveSim(null);}}
            style={{background:'#14080a',color:'#ff3333',border:'1px solid #ff333340',padding:'2px 9px',fontSize:8}}>
            ✕ CLEAR
          </button>
        </div>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>

        {/* LEFT */}
        <div style={{width:235,background:'#040810',borderRight:'1px solid #0d2030',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
          <div style={{padding:'7px',borderBottom:'1px solid #0d2030'}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>FORCE SELECTION</div>
            {Object.entries(COUNTRIES).map(([k,c])=>(
              <button key={k} onClick={()=>setSelCtry(k)} style={{display:'flex',alignItems:'center',gap:6,width:'100%',background:selCtry===k?c.color+'18':'transparent',border:`1px solid ${selCtry===k?c.color+'55':'#0d2030'}`,color:selCtry===k?c.color:'#2a6a8a',padding:'3px 6px',marginBottom:2,textAlign:'left',fontSize:9,fontWeight:selCtry===k?'bold':'normal'}}>
                <span style={{fontSize:11}}>{c.flag}</span><span style={{flex:1}}>{c.name}</span>
                <span style={{background:c.color+'20',padding:'1px 4px',fontSize:7,color:c.color,border:`1px solid ${c.color}30`}}>{units.filter(u=>u.country===k).length}</span>
              </button>
            ))}
          </div>
          <div style={{padding:'5px 7px',borderBottom:'1px solid #0d2030'}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>CATEGORY</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
              {CATS.map(cat=>(
                <button key={cat} onClick={()=>setSelCat(cat)} style={{background:selCat===cat?cc+'20':'transparent',border:`1px solid ${selCat===cat?cc+'70':'#0d2030'}`,color:selCat===cat?cc:'#2a6a8a',padding:'2px 5px',fontSize:7,letterSpacing:.5}}>
                  {CLBL[cat]}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflow:'auto',padding:'5px 7px'}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>{CLBL[selCat].toUpperCase()}</div>
            {(COUNTRIES[selCtry].equipment[selCat]||[]).map(eq=>{
              const isP=placing?.id===eq.id;
              const isS=activeSim&&units.find(u=>u.id===activeSim.unitId)?.name===eq.name;
              return(
                <div key={eq.id} style={{background:isP?cc+'14':isS?cc+'0c':'transparent',border:`1px solid ${isP?cc+'55':isS?cc+'35':'#0d2030'}`,padding:'4px 6px',marginBottom:2}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                    <span style={{fontSize:8,fontWeight:'bold',color:isP||isS?cc:'#4af'}}>{eq.sym} {eq.name}</span>
                    <span style={{fontSize:6,padding:'1px 3px',background:TC[eq.threat]+'1a',color:TC[eq.threat],border:`1px solid ${TC[eq.threat]}35`,letterSpacing:.5}}>{eq.threat}</span>
                  </div>
                  <div style={{fontSize:7,color:'#2a6a8a',marginBottom:3}}>{eq.type}</div>
                  <div style={{display:'flex',gap:2}}>
                    <button onClick={()=>setPlacing(isP?null:eq)} style={{flex:1,background:isP?cc+'2a':'transparent',border:`1px solid ${cc}${isP?'70':'28'}`,color:isP?cc:'#2a6a8a',padding:'2px 0',fontSize:7}}>
                      {isP?'◉ PLACING':'⊕ PLACE'}
                    </button>
                    <button onClick={()=>startSim(eq,selCtry)} style={{flex:1,background:isS?cc+'2a':cc+'0a',border:`1px solid ${cc}${isS?'70':'38'}`,color:cc,padding:'2px 0',fontSize:7,fontWeight:'bold'}}>
                      {isS?'● LIVE':'▶ SIM'}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          {placing&&(
            <div style={{padding:'7px',background:'#120f00',borderTop:'1px solid #2a2000',textAlign:'center'}}>
              <div style={{fontSize:8,color:'#f0c000',marginBottom:2}}>⊕ CLICK MAP TO PLACE</div>
              <div style={{fontSize:7,color:'#f0c00077',marginBottom:4}}>{placing.name}</div>
              <button onClick={()=>setPlacing(null)} style={{background:'transparent',border:'1px solid #2a200055',color:'#f0c00077',padding:'2px 10px',fontSize:7}}>CANCEL</button>
            </div>
          )}
        </div>

        {/* MAP */}
        <div style={{flex:1,position:'relative',overflow:'hidden'}}>
          <canvas ref={cvs} width={W} height={H}
            style={{width:'100%',height:'100%',display:'block',cursor:placing?'crosshair':dragging?'grabbing':'default'}}
            onClick={onClick} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onWheel={onWheel}/>
          {activeSim&&(()=>{const u=units.find(u=>u.id===activeSim.unitId);return u?(<div style={{position:'absolute',top:10,left:'50%',transform:'translateX(-50%)',background:'rgba(2,5,10,0.9)',border:`1px solid ${activeSim.color}45`,padding:'4px 12px',fontSize:8,color:activeSim.color,letterSpacing:1,pointerEvents:'none',whiteSpace:'nowrap'}}>● SIM: {u.name} — {activeSim.type.toUpperCase()}</div>):null;})()}
          <div style={{position:'absolute',bottom:12,right:12,display:'flex',flexDirection:'column',gap:2}}>
            {[['＋',1.14],['－',.88],['⌂',null]].map(([l,f],i)=>(
              <button key={i} onClick={()=>f?setZoom(z=>Math.min(4,Math.max(.22,z*f))):(setZoom(1),setPan({x:0,y:0}))}
                style={{width:24,height:24,background:'#030609',border:'1px solid #0d2030',color:'#4af',fontSize:13}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{position:'absolute',bottom:12,left:12,background:'rgba(2,5,10,0.9)',border:'1px solid #0d2030',padding:'5px 8px'}}>
            <div style={{fontSize:6,color:'#2a6a8a',letterSpacing:2,marginBottom:3}}>THREAT</div>
            {Object.entries(TC).map(([l,c])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
                <span style={{width:6,height:6,background:c,display:'inline-block',clipPath:'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)'}}/>
                <span style={{color:c,fontSize:7}}>{l}</span>
              </div>
            ))}
            <div style={{color:'#2a6a8a',fontSize:6,marginTop:4,borderTop:'1px solid #0d2030',paddingTop:3}}>ALT+DRAG PAN · SCROLL ZOOM<br/>▶ SIM = ANIMATES ON MAP</div>
          </div>
        </div>

        {/* RIGHT */}
        <div style={{width:200,background:'#040810',borderLeft:'1px solid #0d2030',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
          <div style={{padding:'7px',borderBottom:'1px solid #0d2030',minHeight:130}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:5}}>UNIT PROFILE</div>
            {selUO?(
              <div style={{background:COUNTRIES[selUO.country].color+'0c',border:`1px solid ${COUNTRIES[selUO.country].color}28`,padding:'7px'}}>
                <div style={{fontSize:9,fontWeight:'bold',color:COUNTRIES[selUO.country].color,marginBottom:3}}>{selUO.sym} {selUO.name}</div>
                <div style={{fontSize:7,color:'#2a6a8a',marginBottom:5}}>{selUO.type}</div>
                {[['NATION',`${COUNTRIES[selUO.country].flag} ${COUNTRIES[selUO.country].name}`,COUNTRIES[selUO.country].color],['THREAT',selUO.threat,TC[selUO.threat]],['GRID',`${Math.round(selUO.x)},${Math.round(selUO.y)}`,'#4af']].map(([k,v,vc])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:7,color:'#2a6a8a'}}>{k}</span>
                    <span style={{fontSize:7,color:vc}}>{v}</span>
                  </div>
                ))}
                <div style={{display:'flex',gap:3,marginTop:5}}>
                  <button onClick={()=>setActiveSim({unitId:selUO.id,type:getSimType(selUO.id),state:{P:[]},t:0,color:COUNTRIES[selUO.country].color})}
                    style={{flex:1,background:COUNTRIES[selUO.country].color+'14',color:COUNTRIES[selUO.country].color,border:`1px solid ${COUNTRIES[selUO.country].color}38`,padding:'3px',fontSize:7,fontWeight:'bold'}}>
                    ▶ SIM
                  </button>
                  <button onClick={()=>{setUnits(p=>p.filter(u=>u.id!==selUO.id));setSelUnit(null);if(activeSim?.unitId===selUO.id) setActiveSim(null);}}
                    style={{flex:1,background:'#140a0a',color:'#ff3333',border:'1px solid #ff333338',padding:'3px',fontSize:7}}>
                    ✕ DEL
                  </button>
                </div>
              </div>
            ):(
              <div style={{fontSize:7,color:'#2a6a8a',marginTop:6}}>Click a unit to inspect</div>
            )}
          </div>
          {activeSim&&(()=>{const u=units.find(u=>u.id===activeSim.unitId);return u?(
            <div style={{padding:'7px',borderBottom:'1px solid #0d2030',background:'#030709'}}>
              <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>ACTIVE SIM</div>
              <div style={{fontSize:8,color:activeSim.color,fontWeight:'bold',marginBottom:2}}>● {u.name}</div>
              <div style={{fontSize:7,color:'#2a6a8a',marginBottom:2}}>{activeSim.type.toUpperCase()}</div>
              <div style={{fontSize:7,color:'#4af44',marginBottom:5}}>T+{(activeSim.t/60).toFixed(1)}s</div>
              <button onClick={()=>setActiveSim(null)} style={{width:'100%',background:'transparent',border:'1px solid #ff880038',color:'#ff8800',padding:'2px',fontSize:7}}>■ STOP</button>
            </div>
          ):null;})()}
          <div style={{padding:'7px',borderBottom:'1px solid #0d2030'}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>ORDER OF BATTLE</div>
            {Object.entries(COUNTRIES).map(([k,c])=>{const n=units.filter(u=>u.country===k).length;if(!n) return null;return(
              <div key={k} style={{display:'flex',alignItems:'center',gap:4,marginBottom:3}}>
                <span style={{fontSize:10}}>{c.flag}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:7,color:c.color}}>{c.name}</div>
                  <div style={{height:2,background:c.color+'1a',marginTop:1}}><div style={{height:'100%',width:`${Math.min(100,n*8)}%`,background:c.color+'99'}}/></div>
                </div>
                <span style={{fontSize:8,color:c.color,fontWeight:'bold'}}>{n}</span>
              </div>
            );})}
            {units.length===0&&<div style={{fontSize:7,color:'#2a6a8a'}}>No units deployed</div>}
          </div>
          <div style={{flex:1,overflow:'auto',padding:'5px 7px'}}>
            <div style={{fontSize:7,color:'#2a6a8a',letterSpacing:2,marginBottom:4}}>ALL UNITS ({units.length})</div>
            {units.map(u=>(
              <div key={u.id} onClick={()=>setSelUnit(u.id)} style={{display:'flex',alignItems:'center',gap:4,marginBottom:2,padding:'2px 4px',cursor:'pointer',background:selUnit===u.id?COUNTRIES[u.country].color+'16':'transparent',border:`1px solid ${selUnit===u.id?COUNTRIES[u.country].color+'38':'transparent'}`}}>
                <span style={{width:5,height:5,background:TC[u.threat],clipPath:'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)',flexShrink:0}}/>
                <span style={{fontSize:7,color:COUNTRIES[u.country].color,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.sym} {u.name}</span>
                {activeSim?.unitId===u.id&&<span style={{fontSize:6,color:'#ff8800'}}>●</span>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
